# ABOUTME: Release workflow for building and signing production binaries.
# ABOUTME: Triggers on version tags, signs for macOS/Windows, and notarizes for Apple.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  actions: read
  contents: write
  id-token: write

# Serialize ALL release runs (constant group, not per-tag) so two tags cannot
# sign in parallel and stack signing bursts on the shared SSL.com credential,
# which trips its per-minute rate limit (#2282). Queued runs wait, never cancel.
concurrency:
  group: release
  cancel-in-progress: false

env:
  # Harden cargo against transient crates.io download flakes (curl error 56,
  # connection reset mid-stream). Cargo's default net.retry is 3 and does not
  # always recover an in-flight reset; bump retries and disable HTTP/2
  # multiplexing so one dropped connection cannot fail a whole platform's build.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  # Signing availability flags (for conditional steps)
  HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' }}
  # SSL.com eSigner cloud signing for Windows EV code signing
  HAS_WINDOWS_SIGNING: ${{ secrets.ES_USERNAME != '' }}
  # Fail-closed ceiling for billable SSL.com cloud hash-signing operations in one
  # Windows release job. Normal releases spend roughly 0-10; 100 leaves ample
  # drift while a cold/full cache reseed requires an explicit audited repo override.
  MAX_SIGNATURES: ${{ vars.MAX_SIGNATURES || '100' }}
  # Persistent Tier 1 monthly barrier (#2931). Currency is integer cents only;
  # account/certificate and invoice boundary are explicit repository variables.
  SSL_SIGNING_MONTHLY_BUDGET_CENTS: ${{ vars.SSL_SIGNING_MONTHLY_BUDGET_CENTS || '10000' }}
  SSL_SIGNING_TIER_BASE_CENTS: ${{ vars.SSL_SIGNING_TIER_BASE_CENTS || '2000' }}
  SSL_SIGNING_TIER_INCLUDED_OPERATIONS: ${{ vars.SSL_SIGNING_TIER_INCLUDED_OPERATIONS || '20' }}
  SSL_SIGNING_TIER_OVERAGE_CENTS: ${{ vars.SSL_SIGNING_TIER_OVERAGE_CENTS || '100' }}
  SSL_SIGNING_OTHER_FIXED_MONTHLY_CENTS: ${{ vars.SSL_SIGNING_OTHER_FIXED_MONTHLY_CENTS || '0' }}
  SSL_SIGNING_BILLING_ANCHOR_DAY: ${{ vars.SSL_SIGNING_BILLING_ANCHOR_DAY }}
  SSL_SIGNING_BILLING_TIMEZONE: ${{ vars.SSL_SIGNING_BILLING_TIMEZONE }}
  SSL_SIGNING_ACCOUNT: ${{ vars.SSL_SIGNING_ACCOUNT }}
  SSL_SIGNING_CERTIFICATE: ${{ vars.SSL_SIGNING_CERTIFICATE }}
  SSL_SIGNING_LEDGER_R2_PREFIX: windows-signing-ledgers/v1
  # Hard gate for unchanged embedded-runtime releases: if the manifest matches
  # the previous release, a working signature cache should make this near zero.
  WINDOWS_EMBEDDED_RUNTIME_CACHE_HIT_MAX_SIGNED: ${{ vars.WINDOWS_EMBEDDED_RUNTIME_CACHE_HIT_MAX_SIGNED || '25' }}
  # Hard gate when the embedded-runtime manifest changed: the per-file R2 cache
  # must still restore at least this percent of signables, or the release fails
  # instead of silently re-signing (and billing) the unchanged files (#2922).
  # Lower this only for a release that intentionally overhauls the runtime.
  WINDOWS_EMBEDDED_RUNTIME_CACHE_MIN_RESTORE_RATE: ${{ vars.WINDOWS_EMBEDDED_RUNTIME_CACHE_MIN_RESTORE_RATE || '75' }}
  # R2 prefix for the content-addressed signed Windows embedded-runtime blobs.
  WINDOWS_SIGNATURE_CACHE_R2_PREFIX: windows-signature-cache/authenticode

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.set_release_id.outputs.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release - get all commits
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
          else
            # Get commits since previous tag
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi

          # Create release body by writing commits directly (avoid sed issues with special chars)
          {
            echo "## What's New"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "## Installation"
            echo ""
            echo "Download the appropriate installer for your platform:"
            echo "- **macOS (Apple Silicon)**: \`Seren-Desktop_*_aarch64.dmg\`"
            echo "- **macOS (Intel)**: \`Seren-Desktop_*_x64.dmg\`"
            echo "- **Windows**: \`Seren-Desktop_*_x64-setup.exe\` or \`.msi\`"
            echo "- **Linux (x64)**: \`.deb\` or \`.AppImage\`"
            echo "- **Linux (ARM64 / Raspberry Pi)**: \`.deb\` or \`.AppImage\`"
            echo ""
            echo "## Note"
            echo ""
            echo "This is an alpha release. macOS builds are signed; if notarization is still processing, run: \`xattr -cr /Volumes/SerenDesktop/SerenDesktop.app\`"
            echo ""
            echo "<!-- WINDOWS_SIGNING_NOTE -->"
          } > release_notes.md

          echo "Generated release notes:"
          cat release_notes.md

      - name: Sweep stale drafts for this tag
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const tagName = context.ref.replace('refs/tags/', '');
            const expectedName = `Seren Desktop ${tagName}`;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const stale = releases.filter(r =>
              r.draft && (r.tag_name === tagName || r.name === expectedName)
            );
            for (const r of stale) {
              console.log(`Deleting stale draft id=${r.id} name=${r.name} tag=${r.tag_name}`);
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: r.id
                });
              } catch (e) {
                console.log(`  failed: ${e.message}`);
              }
            }
            if (stale.length === 0) {
              console.log(`No stale drafts found for tag ${tagName}`);
            }

      - name: Create or Update Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Seren Desktop ${{ github.ref_name }}
          body_path: release_notes.md
          draft: true
          prerelease: false

      - name: Set release ID output
        id: set_release_id
        run: echo "id=${{ steps.create_release.outputs.id }}" >> $GITHUB_OUTPUT

  build:
    needs: create-release
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
            updater_platform: darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
            updater_platform: darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
            updater_platform: windows-x86_64
          # 24.04 ships the newer PipeWire that xcap's libspa 0.9.2 needs
          # (spa_video_info_raw.flags); 22.04's headers are too old to compile.
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
            updater_platform: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: Linux-arm64
            updater_platform: linux-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Set version from tag
        shell: bash
        run: |
          # Extract version from git tag (strip 'v' prefix)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          # Update tauri.conf.json with the tag version
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          echo "Updated tauri.conf.json version to $VERSION"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.os }}
          workspaces: 'src-tauri'

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libxdo-dev patchelf libfuse2 xdg-utils pkg-config libclang-dev libxcb1-dev libxrandr-dev libdbus-1-dev libpipewire-0.3-dev libwayland-dev libegl-dev libgbm-dev

      - name: Install frontend dependencies
        run: pnpm install

      # ---- Inject publisher plugin (if sidecar binaries were pre-built to R2) ----
      # Publisher sidecars are keyed by publisherVersion from package.json,
      # NOT by the desktop release tag. This decouples publisher builds from
      # the desktop release cycle — only rebuild when publisher code changes.
      - name: Read publisher version from package.json
        id: publisher_version
        shell: bash
        run: |
          PUB_VERSION=$(node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            console.log(pkg.publisherVersion || '');
          ")
          if [ -z "$PUB_VERSION" ]; then
            echo "No publisherVersion in package.json — skipping publisher injection"
            echo "version=" >> $GITHUB_OUTPUT
          else
            echo "Publisher version: $PUB_VERSION"
            echo "version=$PUB_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Check for publisher sidecar binaries
        id: check_sidecars
        if: steps.publisher_version.outputs.version != ''
        shell: bash
        run: |
          PUB_VERSION="${{ steps.publisher_version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXT=".exe"
          else
            EXT=""
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.R2_PUBLIC_URL }}/sidecars/publishers/${PUB_VERSION}/${TARGET}/desktop-mcp-coinbase-trading${EXT}")
          if [ "$STATUS" = "200" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Publisher sidecars found for publishers/${PUB_VERSION}/${TARGET}"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No publisher sidecars for publishers/${PUB_VERSION}/${TARGET} — building OSS-only"
          fi

      - name: Clone seren-desktop-publishers
        if: steps.check_sidecars.outputs.found == 'true'
        uses: actions/checkout@v7
        with:
          repository: serenorg/seren-desktop-publishers
          token: ${{ secrets.GH_PAT }}
          path: seren-desktop-publishers

      - name: Download sidecar binaries from R2
        if: steps.check_sidecars.outputs.found == 'true'
        shell: bash
        run: |
          PUB_VERSION="${{ steps.publisher_version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXT=".exe"
          else
            EXT=""
          fi
          mkdir -p seren-desktop-mcp/target/release
          for bin in desktop-mcp-coinbase-trading desktop-mcp-kraken-trading desktop-mcp-polymarket-trading; do
            curl -fSL -o "seren-desktop-mcp/target/release/${bin}${EXT}" \
              "${{ secrets.R2_PUBLIC_URL }}/sidecars/publishers/${PUB_VERSION}/${TARGET}/${bin}${EXT}"
            chmod +x "seren-desktop-mcp/target/release/${bin}${EXT}" 2>/dev/null || true
            echo "Downloaded: ${bin}${EXT}"
          done

      - name: Inject publisher plugin
        if: steps.check_sidecars.outputs.found == 'true'
        shell: bash
        run: |
          bash seren-desktop-publishers/ci/inject-plugin.sh \
            . \
            seren-desktop-publishers \
            seren-desktop-mcp

      # Windows: gate v* tag releases on signing credentials being available.
      # Without this, a misconfigured secret causes us to ship an unsigned
      # Windows binary that Smart App Control immediately blocks (#2230 audit
      # P1 "Release workflow can claim EV signing even when Windows signing
      # is skipped"). For tag pushes that ARE production releases, refuse to
      # proceed rather than silently ship unsigned. A runtime MAX_SIGNATURES
      # block is distinct: the signer records it and the release intentionally
      # continues with the transparently unsigned fallback required by #2929.
      - name: Require Windows signing for tag releases
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v') && env.HAS_WINDOWS_SIGNING != 'true'
        shell: bash
        run: |
          echo "::error::Windows signing secrets (ES_USERNAME et al.) are not configured."
          echo "::error::Refusing to publish an unsigned Windows artifact for ${GITHUB_REF}."
          echo "::error::Either configure SSL.com eSigner secrets or push a non-v* tag for unsigned dev builds."
          exit 1

      - name: Initialize Windows signing budget telemetry
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        env:
          MONTHLY_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          MONTHLY_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          MONTHLY_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          MONTHLY_R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          [int]$max = 0
          if (-not [int]::TryParse($env:MAX_SIGNATURES, [ref]$max) -or $max -lt 0) {
            Write-Host "::error::MAX_SIGNATURES must be a non-negative integer, got '$env:MAX_SIGNATURES'."
            exit 1
          }
          $telemetry = Join-Path $env:RUNNER_TEMP "windows-signing-telemetry.jsonl"
          $blockFile = Join-Path $env:RUNNER_TEMP "windows-signing-budget-block.json"
          $monthlyState = Join-Path $env:RUNNER_TEMP "windows-signing-monthly-state.json"
          Remove-Item -LiteralPath $telemetry -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $blockFile -Force -ErrorAction SilentlyContinue
          "WINDOWS_SIGN_TELEMETRY_FILE=$telemetry" >> $env:GITHUB_ENV
          "WINDOWS_SIGNING_BLOCK_FILE=$blockFile" >> $env:GITHUB_ENV
          "WINDOWS_SIGNING_MONTHLY_STATE_FILE=$monthlyState" >> $env:GITHUB_ENV
          "WINDOWS_SIGNING_BLOCKED=false" >> $env:GITHUB_ENV
          "WINDOWS_SIGNING_MONTHLY_BLOCKED=false" >> $env:GITHUB_ENV
          "AWS_ACCESS_KEY_ID=$env:MONTHLY_R2_ACCESS_KEY_ID" >> $env:GITHUB_ENV
          "AWS_SECRET_ACCESS_KEY=$env:MONTHLY_R2_SECRET_ACCESS_KEY" >> $env:GITHUB_ENV
          "AWS_DEFAULT_REGION=auto" >> $env:GITHUB_ENV
          "AWS_ENDPOINT_URL=$env:MONTHLY_R2_ENDPOINT" >> $env:GITHUB_ENV
          "R2_BUCKET=$env:MONTHLY_R2_BUCKET" >> $env:GITHUB_ENV
          Write-Host "Windows signing telemetry: $telemetry"
          Write-Host "Windows signing block state: $blockFile"
          Write-Host "Windows signing MAX_SIGNATURES=$max"

      # macOS: Import certificates and setup keychain (skip if no certificate)
      - name: Import macOS certificates
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate from secrets
          echo -n "$APPLE_CERTIFICATE" | base64 --decode > $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # Windows: load the SSL.com EV code-signing certificate into the runner's
      # certificate store via eSigner CKA (Cloud Key Adapter). Once loaded,
      # signtool signs any number of files in place with no per-file OTP and no
      # batch-size cap — unlike CodeSignTool batch_sign, which rejects >100 files
      # per call and so could not sign the ~700-file embedded runtime (#2276).
      - name: Setup eSigner CKA (Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        run: |
          $installDir = Join-Path $env:USERPROFILE "eSignerCKA"
          $masterKey  = Join-Path $installDir "master.key"
          Invoke-WebRequest -Uri "https://github.com/SSLcom/eSignerCKA/releases/download/v1.0.8/SSL.COM-eSigner-CKA_1.0.8.zip" -OutFile eSigner_CKA_Setup.zip
          Expand-Archive -Force eSigner_CKA_Setup.zip
          Remove-Item eSigner_CKA_Setup.zip
          Move-Item -Destination "eSigner_CKA_Installer.exe" -Path "eSigner_CKA_Setup\*.exe"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Start-Process ".\eSigner_CKA_Installer.exe" -ArgumentList '/CURRENTUSER','/VERYSILENT','/SUPPRESSMSGBOXES',"/DIR=$installDir" -Wait
          # Register the eSigner CNG Key Storage Provider so signtool can reach the
          # cloud private key. Without RegisterKSP, signtool sees the cert but no
          # usable key and fails with "No certificates were found that met all the
          # given criteria" (#2276 follow-up). VC++ runtimes are pre-installed on
          # the runner, so install the bundled redists only if the installer
          # staged them.
          if (Test-Path ".\setup\vc_redist.x64.exe") {
            Start-Process ".\setup\vc_redist.x86.exe" -ArgumentList "/install","/q" -Wait
            Start-Process ".\setup\vc_redist.x64.exe" -ArgumentList "/install","/q" -Wait
          }
          $registerKsp = Get-ChildItem -Path $installDir -Recurse -Filter "RegisterKSP.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $registerKsp) {
            Write-Host "::error::RegisterKSP.exe not found under $installDir — eSigner KSP cannot be registered."
            exit 1
          }
          & $registerKsp.FullName | Out-Null
          $cspConfig = Get-ChildItem -Path $installDir -Recurse -Filter "eSignerCSP.Config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($cspConfig) { & $cspConfig.FullName | Out-Null }
          $cka = Join-Path $installDir "eSignerCKATool.exe"
          if (-not (Test-Path -LiteralPath $cka)) {
            Write-Host "::error::eSignerCKATool.exe not found at $cka — eSigner CKA cannot load certificates."
            exit 1
          }

          function Invoke-EsignerCka {
            param(
              [Parameter(Mandatory = $true)][string]$Step,
              [Parameter(Mandatory = $true)][string[]]$Arguments
            )
            & $cka @Arguments
            $exitCode = $LASTEXITCODE
            if ($exitCode -ne 0) {
              if ($Step -eq "config/login") {
                Write-Host "::error::eSigner CKA config/login failed with exit code $exitCode. Validate or rotate ES_USERNAME, ES_PASSWORD, and ES_TOTP_SECRET."
              } else {
                Write-Host "::error::eSigner CKA $Step failed with exit code $exitCode."
              }
              exit $exitCode
            }
          }

          Invoke-EsignerCka "config/login" @("config", "-mode", "PRODUCTION", "-user", "$env:ES_USERNAME", "-pass", "$env:ES_PASSWORD", "-totp", "$env:ES_TOTP_SECRET", "-key", "$masterKey", "-r")
          Invoke-EsignerCka "unload" @("unload")
          Invoke-EsignerCka "load" @("load")
          $cert = Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert | Select-Object -First 1
          if (-not $cert) {
            Write-Host "::error::eSigner CKA did not load a code-signing certificate into the store."
            exit 1
          }
          "WINDOWS_SIGN_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Write-Host "Loaded EV certificate: $($cert.Subject) [$($cert.Thumbprint)]"

      # Stage the embedded runtime (node / Git-for-Windows / Python / playwright
      # sidecars) and EV-sign it in place BEFORE `tauri build` so the signatures
      # are baked into the NSIS installer AND the .nsis.zip updater bundle
      # (#2235). These are the binaries Smart App Control blocks once extracted to
      # %LOCALAPPDATA%\SerenDesktop\embedded-runtime on the user's machine. The
      # build then runs with SEREN_TAURI_SKIP_PREP so it does not re-download and
      # clobber the signed files.
      - name: Stage embedded runtime for signing (Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: pnpm prepare:tauri-build

      - name: Fetch previous Windows signing cache state
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagName = '${{ github.ref_name }}';
            const stateAssetName = 'windows-signing-cache-state.json';
            const outputPath = 'windows-signing-cache-previous-state.json';

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 50,
            });
            const previous = releases.find((release) => !release.draft && release.tag_name !== tagName);
            if (!previous) {
              core.notice('No previous published release found for Windows signing cache comparison.');
              return;
            }

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: previous.id,
              per_page: 100,
            });
            const stateAsset = assets.find((asset) => asset.name === stateAssetName);
            if (!stateAsset) {
              core.notice(`Previous release ${previous.tag_name} has no ${stateAssetName}; first gated release will write it.`);
              return;
            }

            const response = await github.request('GET /repos/{owner}/{repo}/releases/assets/{asset_id}', {
              owner,
              repo,
              asset_id: stateAsset.id,
              headers: {
                accept: 'application/octet-stream',
              },
            });
            const raw = typeof response.data === 'string'
              ? response.data
              : Buffer.isBuffer(response.data)
                ? response.data.toString('utf8')
                : response.data instanceof ArrayBuffer
                  ? Buffer.from(response.data).toString('utf8')
                  : JSON.stringify(response.data);
            JSON.parse(raw);
            fs.writeFileSync(outputPath, raw);
            core.notice(`Downloaded Windows signing cache state from ${previous.tag_name} to ${outputPath}.`);

      - name: Setup AWS CLI for Windows signature cache
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        run: |
          $aws = Get-Command aws -ErrorAction SilentlyContinue
          if (-not $aws) {
            python -m pip install --user awscli
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Failed to install awscli for Windows signature cache restore/save."
              exit $LASTEXITCODE
            }
            $scriptsDir = python -c "import os, site; print(os.path.join(site.USER_BASE, 'Scripts'))"
            $env:PATH = "$scriptsDir;$env:PATH"
            Add-Content -LiteralPath $env:GITHUB_PATH -Value $scriptsDir
          }
          aws --version

      - name: Restore Windows signature cache from R2
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if (-not $env:AWS_ACCESS_KEY_ID -or -not $env:AWS_SECRET_ACCESS_KEY -or -not $env:AWS_ENDPOINT_URL -or -not $env:R2_BUCKET) {
            Write-Host "::error::R2 credentials are required for the Windows signature cache."
            exit 1
          }
          $cacheDir = ".sig-cache/windows-authenticode"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          $source = "s3://$env:R2_BUCKET/$env:WINDOWS_SIGNATURE_CACHE_R2_PREFIX"
          Write-Host "Restoring Windows signature cache from $source"
          aws s3 sync $source $cacheDir `
            --endpoint-url="$env:AWS_ENDPOINT_URL" `
            --exclude "*" `
            --include "*.signed" `
            --no-progress `
            --only-show-errors
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Failed to restore Windows signature cache from R2."
            exit $LASTEXITCODE
          }
          $count = @(Get-ChildItem -LiteralPath $cacheDir -Filter "*.signed" -File -ErrorAction SilentlyContinue).Count
          Write-Host "Windows signature cache: restored $count signed blob(s) from R2."

      # Discover the signable set with the tested cross-platform selector, then
      # sign it throttled to stay under SSL.com's per-minute rate limit (#2282).
      # The embedded runtime is the only large payload, so it carries the throttle;
      # the per-file installer/helper signings below stay unthrottled (tiny sets).
      # A content-addressed signature cache restores unchanged binaries before
      # signing, so steady-state releases only spend signatures on changed files
      # while the signer keeps its existing Valid-signature skip and telemetry.
      - name: Sign embedded runtime (Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        run: |
          pnpm tsx scripts/print-windows-signables.ts `
            src-tauri/embedded-runtime src-tauri/mcp-servers > sign-targets.txt
          ./scripts/windows-signature-cache.ps1 `
            -Mode restore `
            -ListFile sign-targets.txt `
            -CacheDir .sig-cache/windows-authenticode `
            -Manifest windows-signature-cache-manifest.tsv `
            -Thumbprint $env:WINDOWS_SIGN_THUMBPRINT
          ./scripts/sign-windows-payload.ps1 `
            -Thumbprint $env:WINDOWS_SIGN_THUMBPRINT `
            -ListFile sign-targets.txt `
            -SigningSource "embedded-runtime-and-mcp" `
            -BatchSize 10 `
            -DelaySeconds 30
          ./scripts/windows-signature-cache.ps1 `
            -Mode save `
            -ListFile sign-targets.txt `
            -CacheDir .sig-cache/windows-authenticode `
            -Manifest windows-signature-cache-manifest.tsv `
            -Thumbprint $env:WINDOWS_SIGN_THUMBPRINT

      - name: Save Windows signature cache to R2
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED != 'true'
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if (-not $env:AWS_ACCESS_KEY_ID -or -not $env:AWS_SECRET_ACCESS_KEY -or -not $env:AWS_ENDPOINT_URL -or -not $env:R2_BUCKET) {
            Write-Host "::error::R2 credentials are required for the Windows signature cache."
            exit 1
          }
          $cacheDir = ".sig-cache/windows-authenticode"
          $count = @(Get-ChildItem -LiteralPath $cacheDir -Filter "*.signed" -File -ErrorAction SilentlyContinue).Count
          if ($count -eq 0) {
            Write-Host "::warning::No Windows signature cache blobs exist to upload to R2."
            exit 0
          }
          $target = "s3://$env:R2_BUCKET/$env:WINDOWS_SIGNATURE_CACHE_R2_PREFIX"
          Write-Host "Saving $count Windows signature cache blob(s) to $target"
          aws s3 sync $cacheDir $target `
            --endpoint-url="$env:AWS_ENDPOINT_URL" `
            --exclude "*" `
            --include "*.signed" `
            --size-only `
            --no-progress `
            --only-show-errors
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Failed to save Windows signature cache to R2."
            exit $LASTEXITCODE
          }
          Write-Host "Windows signature cache: R2 save completed."

      - name: Assert Windows signature cache hit budget
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED != 'true'
        shell: pwsh
        run: |
          ./scripts/assert-windows-signature-cache.ps1 `
            -ListFile sign-targets.txt `
            -Manifest windows-signature-cache-manifest.tsv `
            -PreviousState windows-signing-cache-previous-state.json `
            -OutputState windows-signing-cache-state.json `
            -MaxSignedWhenUnchanged $env:WINDOWS_EMBEDDED_RUNTIME_CACHE_HIT_MAX_SIGNED `
            -MinRestoreRateWhenChanged $env:WINDOWS_EMBEDDED_RUNTIME_CACHE_MIN_RESTORE_RATE

      # makensis embeds the stock NSIS plugins ($PLUGINSDIR: System.dll,
      # nsExec.dll, StartMenu.dll, nsDialogs.dll) from the bundler's NSIS
      # toolset cache, NOT from the signed build-local copies — the copy is
      # only on the plugin search path for additional/nsis_tauri_utils.dll
      # (tauri#14147; fixed upstream in tauri#15422 but unreleased, and
      # upstream's sign list misses nsExec.dll, which installer-hooks.nsh
      # uses). Seed the cache exactly as the bundler would and EV-sign the
      # stock plugin DLLs in place; they are not hash-pinned, so the
      # signatures survive the build (#2299).
      # The stock plugins are byte-identical across releases (pinned NsisSha1),
      # so cache their signatures in the same R2 store the embedded runtime uses.
      # The cache dir was already restored from R2 above; the save step below
      # pushes any freshly signed plugins back for the next release to reuse.
      - name: Stage signed NSIS toolset (Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        run: |
          ./scripts/stage-signed-nsis-toolset.ps1 `
            -CacheDir .sig-cache/windows-authenticode `
            -Manifest windows-nsis-cache-manifest.tsv `
            -Thumbprint $env:WINDOWS_SIGN_THUMBPRINT

      - name: Save NSIS signature cache to R2
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED != 'true'
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if (-not $env:AWS_ACCESS_KEY_ID -or -not $env:AWS_SECRET_ACCESS_KEY -or -not $env:AWS_ENDPOINT_URL -or -not $env:R2_BUCKET) {
            Write-Host "::error::R2 credentials are required for the Windows signature cache."
            exit 1
          }
          $cacheDir = ".sig-cache/windows-authenticode"
          $count = @(Get-ChildItem -LiteralPath $cacheDir -Filter "*.signed" -File -ErrorAction SilentlyContinue).Count
          if ($count -eq 0) {
            Write-Host "::warning::No Windows signature cache blobs exist to upload to R2."
            exit 0
          }
          $target = "s3://$env:R2_BUCKET/$env:WINDOWS_SIGNATURE_CACHE_R2_PREFIX"
          Write-Host "Saving $count Windows signature cache blob(s) to $target"
          aws s3 sync $cacheDir $target `
            --endpoint-url="$env:AWS_ENDPOINT_URL" `
            --exclude "*" `
            --include "*.signed" `
            --size-only `
            --no-progress `
            --only-show-errors
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Failed to save NSIS signature cache to R2."
            exit $LASTEXITCODE
          }
          Write-Host "NSIS signature cache: R2 save completed."

      # Build the app (with signing for macOS when certificates available)
      # Note: APPLE_ID/PASSWORD/TEAM_ID removed to prevent Tauri's internal notarization
      # Notarization is handled separately with polling in the "Notarize macOS app" step
      - name: Build Tauri app (signed)
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      # Build the app (unsigned for macOS without certificates, or other platforms)
      - name: Build Tauri app (unsigned, Linux)
        if: startsWith(matrix.os, 'ubuntu')
        env:
          NO_STRIP: "true"
        run: pnpm tauri build --verbose --target ${{ matrix.target }} --bundles deb,appimage
      # Single signed Windows build. The signCommand overlay makes the bundler
      # itself sign at the correct points in its pipeline (#2294): Seren.exe
      # AFTER bundle-type patching, nsis_tauri_utils.dll on the build-local
      # plugin copy (the only plugin makensis takes from that copy — the stock
      # plugins come from the pre-signed toolset cache staged above, #2299),
      # the uninstaller via the !uninstfinalize hook, and the setup .exe after
      # makensis. The previous build->sign->rebuild dance could never work:
      # every rebuild re-patched the exe (stripping its signature) and
      # restored the mis-hashed plugin cache from upstream.
      # The overlay lives outside tauri.conf.json so contributor Windows
      # builds never attempt to sign. The wrapper reads WINDOWS_SIGN_THUMBPRINT
      # from the eSigner CKA step via GITHUB_ENV.
      - name: Build Tauri app (budget-aware, Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        env:
          # The embedded runtime was already staged and EV-signed above; skip
          # re-preparation so the build does not overwrite the signed binaries
          # with fresh unsigned downloads (#2235).
          SEREN_TAURI_SKIP_PREP: "1"
        shell: pwsh
        run: |
          pnpm tsx scripts/print-windows-sign-overlay.ts "$env:GITHUB_WORKSPACE" > sign-overlay.json
          Get-Content sign-overlay.json
          pnpm tauri build --target ${{ matrix.target }} --config sign-overlay.json
      - name: Build Tauri app (unsigned, other)
        if: matrix.os != 'macos-latest' && !startsWith(matrix.os, 'ubuntu') && !(matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true')
        run: pnpm tauri build --target ${{ matrix.target }}
      - name: Build Tauri app (unsigned, macOS without signing)
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_SIGNING != 'true'
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Summarize Windows signing budget
        if: always() && matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        run: |
          $summary = $env:GITHUB_STEP_SUMMARY
          $telemetry = $env:WINDOWS_SIGN_TELEMETRY_FILE
          Add-Content -LiteralPath $summary -Value "## Windows signing budget"
          Add-Content -LiteralPath $summary -Value ""
          Add-Content -LiteralPath $summary -Value "- MAX_SIGNATURES: $env:MAX_SIGNATURES"
          Add-Content -LiteralPath $summary -Value "- Telemetry: ``$telemetry``"
          if (-not $telemetry -or -not (Test-Path -LiteralPath $telemetry)) {
            throw "No Windows signing telemetry found at: $telemetry"
          }

          $records = @()
          foreach ($line in (Get-Content -LiteralPath $telemetry)) {
            $trimmed = $line.Trim()
            if (-not $trimmed) { continue }
            $records += ($trimmed | ConvertFrom-Json)
          }

          [int]$discovered = 0
          [int]$skipped = 0
          [int]$wouldSign = 0
          [int]$signed = 0
          $blocked = $false
          foreach ($record in $records) {
            if ($null -ne $record.discovered) { $discovered += [int]$record.discovered }
            if ($null -ne $record.skipped) { $skipped += [int]$record.skipped }
            if ($null -ne $record.would_sign) { $wouldSign += [int]$record.would_sign }
            if ($null -ne $record.signed) { $signed += [int]$record.signed }
            if ($record.status -eq "blocked_over_budget" -or $record.status -eq "skipped_budget_blocked" -or $record.status -eq "blocked_monthly_budget") { $blocked = $true }
          }
          $monthlyBlocked = $records.status -contains "blocked_monthly_budget"
          $status = if ($monthlyBlocked) { "blocked_monthly_budget" } elseif ($blocked) { "blocked_over_budget" } else { "within_budget" }
          Add-Content -LiteralPath $summary -Value "- Status: $status"
          Add-Content -LiteralPath $summary -Value "- Projected cloud signatures: $wouldSign"
          Add-Content -LiteralPath $summary -Value "- Discovered: $discovered"
          Add-Content -LiteralPath $summary -Value "- Skipped already valid: $skipped"
          Add-Content -LiteralPath $summary -Value "- Actual cloud signatures spent: $signed"
          Add-Content -LiteralPath $summary -Value "- Signing blocked: $($blocked.ToString().ToLowerInvariant())"
          if (Test-Path -LiteralPath $env:WINDOWS_SIGNING_MONTHLY_STATE_FILE) {
            $monthly = Get-Content -Raw -LiteralPath $env:WINDOWS_SIGNING_MONTHLY_STATE_FILE | ConvertFrom-Json
            Add-Content -LiteralPath $summary -Value "- Monthly cycle: $($monthly.billing_cycle) ($($monthly.cycle_starts_at) to $($monthly.cycle_ends_at))"
            Add-Content -LiteralPath $summary -Value "- Monthly operations used/reserved: $($monthly.committed_or_reserved_operations)"
            Add-Content -LiteralPath $summary -Value "- Monthly operations remaining at configured cost: $([Math]::Max(0, $monthly.configuration.included_operations + [Math]::Floor(($monthly.configuration.budget_cents - $monthly.configuration.base_cents - $monthly.configuration.other_fixed_monthly_cents) / $monthly.configuration.overage_cents) - $monthly.committed_or_reserved_operations))"
            Add-Content -LiteralPath $summary -Value "- Monthly projected charge: `$$('{0:F2}' -f ($monthly.projected_cost_cents / 100))"
            Add-Content -LiteralPath $summary -Value "- Monthly ledger version: $($monthly.version)"
          }
          Add-Content -LiteralPath $summary -Value ""
          Add-Content -LiteralPath $summary -Value "| Status | Source | Discovered | Skipped | Would sign | Signed | Previous signed |"
          Add-Content -LiteralPath $summary -Value "|---|---|---:|---:|---:|---:|---:|"
          foreach ($record in $records) {
            $source = ([string]$record.source).Replace("|", "\|")
            Add-Content -LiteralPath $summary -Value "| $($record.status) | ``$source`` | $($record.discovered) | $($record.skipped) | $($record.would_sign) | $($record.signed) | $($record.previous_signed) |"
          }
          $state = [PSCustomObject]@{
            schema_version = 1
            status = $status
            blocked = $blocked
            max_signatures = [int]$env:MAX_SIGNATURES
            projected_total = $wouldSign
            actual_signed = $signed
            monthly = if (Test-Path -LiteralPath $env:WINDOWS_SIGNING_MONTHLY_STATE_FILE) { Get-Content -Raw -LiteralPath $env:WINDOWS_SIGNING_MONTHLY_STATE_FILE | ConvertFrom-Json } else { $null }
            sources = @($records)
          }
          ($state | ConvertTo-Json -Depth 6) | Set-Content -LiteralPath "windows-signing-budget-state.json"
          Write-Host "Windows signing budget summary: status=$status projected=$wouldSign signed=$signed max=$env:MAX_SIGNATURES"

      # Verify dist/ contains current frontend code.
      # Catches stale dist/ bundles that bypass beforeBuildCommand.
      - name: Verify frontend dist is current
        run: pnpm verify:frontend-build

      # Upload macOS DMG immediately (before notarization so we always have an artifact)
      - name: Upload macOS DMG (pre-notarization)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: Seren-Desktop-${{ matrix.name }}.dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      # macOS: Notarize the DMG (non-blocking - continues even if notarization fails/times out)
      # Uses polling with retries to handle Apple's notary service issues
      # Note: the .app bundle is notarized separately in the step below
      - name: Notarize macOS DMG
        id: notarize
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Find the DMG file
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)

          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found"
            exit 1
          fi

          echo "Notarizing $DMG_PATH"

          # Retry logic: 3 submission attempts
          MAX_SUBMISSION_ATTEMPTS=3
          SUBMISSION_ATTEMPT=0
          NOTARIZATION_SUCCESS=false

          while [ $SUBMISSION_ATTEMPT -lt $MAX_SUBMISSION_ATTEMPTS ] && [ "$NOTARIZATION_SUCCESS" = "false" ]; do
            SUBMISSION_ATTEMPT=$((SUBMISSION_ATTEMPT + 1))
            echo "=== Submission attempt $SUBMISSION_ATTEMPT/$MAX_SUBMISSION_ATTEMPTS ==="

            # Submit for notarization
            SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1) || true

            echo "Submit output: $SUBMIT_OUTPUT"
            SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -o '"id"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | sed 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')

            if [ -z "$SUBMISSION_ID" ]; then
              echo "Failed to get submission ID, retrying in 30 seconds..."
              sleep 30
              continue
            fi

            echo "Submission ID: $SUBMISSION_ID"
            echo "Polling for notarization status..."

            # Poll for status (max 2 hours per attempt = 120 polls * 60 seconds)
            MAX_POLL_ATTEMPTS=120
            POLL_ATTEMPT=0
            POLL_RESULT="timeout"

            while [ $POLL_ATTEMPT -lt $MAX_POLL_ATTEMPTS ]; do
              POLL_ATTEMPT=$((POLL_ATTEMPT + 1))
              echo "Status check $POLL_ATTEMPT/$MAX_POLL_ATTEMPTS (attempt $SUBMISSION_ATTEMPT)..."

              STATUS_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --output-format json 2>&1) || true

              # Check for Accepted status
              if echo "$STATUS_OUTPUT" | grep -q '"status"[[:space:]]*:[[:space:]]*"Accepted"'; then
                echo "Notarization accepted!"
                POLL_RESULT="accepted"
                break
              fi

              # Check for Invalid/Rejected status (don't retry these - they need fixes)
              if echo "$STATUS_OUTPUT" | grep -q '"status"[[:space:]]*:[[:space:]]*"Invalid"'; then
                echo "Notarization failed - Invalid"
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
                POLL_RESULT="rejected"
                break
              fi

              if echo "$STATUS_OUTPUT" | grep -q '"status"[[:space:]]*:[[:space:]]*"Rejected"'; then
                echo "Notarization rejected"
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
                POLL_RESULT="rejected"
                break
              fi

              # Still in progress, wait 60 seconds
              sleep 60
            done

            if [ "$POLL_RESULT" = "accepted" ]; then
              NOTARIZATION_SUCCESS=true
            elif [ "$POLL_RESULT" = "rejected" ]; then
              # Don't retry rejections - they need code fixes
              echo "Notarization was rejected by Apple - not retrying"
              exit 1
            else
              echo "Polling timed out after 2 hours, will retry submission..."
              sleep 60
            fi
          done

          if [ "$NOTARIZATION_SUCCESS" = "false" ]; then
            echo "Notarization failed after $MAX_SUBMISSION_ATTEMPTS attempts"
            exit 1
          fi

          # Staple the notarization ticket
          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_PATH"
          echo "Notarization and stapling complete!"

      # Upload notarized DMG if notarization succeeded (overwrites the pre-notarization artifact)
      - name: Upload macOS DMG (notarized)
        if: matrix.os == 'macos-latest' && steps.notarize.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: Seren-Desktop-${{ matrix.name }}.dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          overwrite: true

      # macOS: Notarize the .app bundle and re-pack the updater artifact.
      # The Tauri build code-signs the .app but does not notarize it.
      # The DMG gets its own notarization (above), but the in-app updater
      # delivers .app.tar.gz which contains the raw .app — without a stapled
      # notarization ticket, Gatekeeper on Sequoia+ rejects it as "damaged".
      - name: Notarize macOS .app bundle and re-pack updater
        id: notarize_app
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP_PATH=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in $BUNDLE_DIR"
            exit 1
          fi

          APP_NAME=$(basename "$APP_PATH")
          echo "Notarizing .app bundle: $APP_PATH"

          # Zip the .app for submission (notarytool requires zip/dmg/pkg)
          ZIP_PATH="${APP_PATH}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          # Submit and wait (up to 30 minutes per attempt, 3 attempts)
          MAX_ATTEMPTS=3
          ATTEMPT=0
          NOTARIZATION_SUCCESS=false

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ] && [ "$NOTARIZATION_SUCCESS" = "false" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "=== .app notarization attempt $ATTEMPT/$MAX_ATTEMPTS ==="

            if xcrun notarytool submit "$ZIP_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 1800; then
              NOTARIZATION_SUCCESS=true
              echo ".app notarization accepted!"
            else
              echo ".app notarization attempt $ATTEMPT failed"
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Retrying in 30 seconds..."
                sleep 30
              fi
            fi
          done

          rm -f "$ZIP_PATH"

          if [ "$NOTARIZATION_SUCCESS" = "false" ]; then
            echo ".app notarization failed after $MAX_ATTEMPTS attempts"
            exit 1
          fi

          # Staple the notarization ticket to the .app
          echo "Stapling notarization ticket to .app..."
          xcrun stapler staple "$APP_PATH"
          echo ".app stapling complete!"

          # Re-pack the updater .app.tar.gz from the now-notarized .app
          echo "Re-packing updater artifact with notarized .app..."
          TAR_PATH="$BUNDLE_DIR/SerenDesktop.app.tar.gz"
          rm -f "$TAR_PATH" "${TAR_PATH}.sig"
          tar -czf "$TAR_PATH" -C "$BUNDLE_DIR" "$APP_NAME"
          echo "Created: $TAR_PATH ($(wc -c < "$TAR_PATH") bytes)"

          # Re-sign the new .app.tar.gz with the Tauri updater key
          echo "Re-signing updater artifact with Tauri key..."
          pnpm tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$TAR_PATH"
          echo "Re-signed: ${TAR_PATH}.sig"

          echo "Files in $BUNDLE_DIR:"
          ls -la "$BUNDLE_DIR/"

      # Verify Windows code signing on the NSIS setup .exe AND every shipped
      # .exe inside the installed app payload. The prior check only validated
      # the outer setup .exe, which left bundled Seren.exe + sidecars unsigned
      # in the install payload and triggered Smart App Control blocks on
      # users' machines (#2230 audit P0/P1 #1).
      - name: Verify Windows code signing (NSIS setup .exe)
        id: verify_windows_setup
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED != 'true'
        shell: pwsh
        run: |
          Write-Host "Verifying NSIS setup .exe signatures..."
          $nsisFiles = Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/bundle/nsis" -Filter "*.exe"
          if ($nsisFiles.Count -eq 0) {
            Write-Host "::error::No NSIS .exe files found to verify"
            exit 1
          }
          foreach ($file in $nsisFiles) {
            Write-Host "Checking signature for: $($file.FullName)"
            $sig = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if ($sig.Status -eq "Valid") {
              Write-Host "  Valid signature: $($sig.SignerCertificate.Subject)"
            } else {
              Write-Host "::error::Invalid or missing signature on $($file.FullName): $($sig.Status)"
              exit 1
            }
          }
          Write-Host "NSIS setup .exe is properly signed."

      # The .nsis.zip updater bundle is what pendingUpdate.downloadAndInstall()
      # consumes — NOT the public setup .exe. With signCommand the bundler signs
      # the setup .exe before zipping, so the bundle should already contain the
      # signed installer; this re-pack from the loose signed setup .exe is kept
      # as a guarantee until a green release proves it redundant (#2294). It
      # mirrors the macOS .app.tar.gz re-pack/re-sign pattern above (#2236).
      - name: Re-pack and re-sign .nsis.zip updater bundle (Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED != 'true'
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          $zip = Get-ChildItem -Path $nsisDir -Filter "*.nsis.zip" | Select-Object -First 1
          if (-not $zip) {
            Write-Host "No .nsis.zip updater bundle found in $nsisDir — skipping re-pack."
            exit 0
          }
          $setup = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) {
            Write-Host "::error::.nsis.zip present but no *-setup.exe to pack into it."
            exit 1
          }
          # The setup .exe must already be EV-signed (verified in the step above).
          $sig = Get-AuthenticodeSignature -LiteralPath $setup.FullName
          if ($sig.Status -ne "Valid") {
            Write-Host "::error::Refusing to pack an unsigned setup .exe into the updater bundle: $($sig.Status)"
            exit 1
          }
          Write-Host "Re-packing $($zip.Name) from signed $($setup.Name)..."
          Remove-Item -Path $zip.FullName -Force
          Remove-Item -Path "$($zip.FullName).sig" -Force -ErrorAction SilentlyContinue
          # Compress-Archive stores the file at the archive root by basename,
          # matching the layout Tauri's updater expects.
          # NoCompression (Stored, method 0) is REQUIRED: tauri-plugin-updater
          # builds the Windows `zip` crate with default-features = false, so its
          # extractor has no Deflate codec and can only read Stored entries.
          # Tauri's bundler emits the .nsis.zip Stored for this reason; a Deflate
          # re-pack (-CompressionLevel Optimal) ships an archive the updater
          # rejects with "Compression method not supported" (#2479).
          Compress-Archive -Path $setup.FullName -DestinationPath $zip.FullName -CompressionLevel NoCompression -Force
          Write-Host "Re-signing $($zip.Name) with the Tauri updater key..."
          pnpm tauri signer sign -k "$env:TAURI_SIGNING_PRIVATE_KEY" -p "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" $zip.FullName
          if (-not (Test-Path "$($zip.FullName).sig")) {
            Write-Host "::error::Updater signature not produced: $($zip.FullName).sig"
            exit 1
          }
          Write-Host "Re-packed and re-signed the .nsis.zip updater bundle."

      # Verify the re-packed updater bundle on the actual bytes the updater will
      # deliver: (1) every entry is Stored-compressed, and (2) every .exe/.dll
      # inside reports a Valid Authenticode signature. We have been bitten before
      # by Tauri repacking artifacts and losing signatures (#2236) and by a
      # Deflate re-pack the updater cannot extract (#2479), so this is a hard gate.
      - name: Verify .nsis.zip updater bundle signatures (Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED != 'true'
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          $zip = Get-ChildItem -Path $nsisDir -Filter "*.nsis.zip" | Select-Object -First 1
          if (-not $zip) {
            Write-Host "No .nsis.zip to verify — skipping."
            exit 0
          }

          # Hard gate: the .nsis.zip MUST be Stored (compression method 0).
          # tauri-plugin-updater builds the Windows `zip` crate with
          # default-features = false, so its extractor has no Deflate codec and
          # fails any compressed entry with "Compression method not supported" at
          # install time — invisible until a user tries to upgrade (#2479). Walk
          # the Zip central directory and assert every entry uses method 0.
          $bytes = [System.IO.File]::ReadAllBytes($zip.FullName)
          $eocd = -1
          for ($i = $bytes.Length - 22; $i -ge 0; $i--) {
            if ($bytes[$i] -eq 0x50 -and $bytes[$i + 1] -eq 0x4B -and $bytes[$i + 2] -eq 0x05 -and $bytes[$i + 3] -eq 0x06) {
              $eocd = $i; break
            }
          }
          if ($eocd -lt 0) {
            Write-Host "::error::Could not locate End Of Central Directory in $($zip.Name); cannot verify compression method."
            exit 1
          }
          $entryCount = [BitConverter]::ToUInt16($bytes, $eocd + 10)
          $cdOffset = [BitConverter]::ToUInt32($bytes, $eocd + 16)
          if ($cdOffset -eq [uint32]::MaxValue) {
            Write-Host "::error::$($zip.Name) uses Zip64; the updater bundle is unexpectedly large — investigate before shipping."
            exit 1
          }
          $p = [int]$cdOffset
          $notStored = @()
          for ($e = 0; $e -lt $entryCount; $e++) {
            if (-not ($bytes[$p] -eq 0x50 -and $bytes[$p + 1] -eq 0x4B -and $bytes[$p + 2] -eq 0x01 -and $bytes[$p + 3] -eq 0x02)) {
              Write-Host "::error::Malformed central directory entry $e in $($zip.Name)."
              exit 1
            }
            $method = [BitConverter]::ToUInt16($bytes, $p + 10)
            $nameLen = [BitConverter]::ToUInt16($bytes, $p + 28)
            $extraLen = [BitConverter]::ToUInt16($bytes, $p + 30)
            $commentLen = [BitConverter]::ToUInt16($bytes, $p + 32)
            $name = [System.Text.Encoding]::ASCII.GetString($bytes, $p + 46, $nameLen)
            if ($method -ne 0) { $notStored += "$name (method=$method)" }
            $p += 46 + $nameLen + $extraLen + $commentLen
          }
          if ($notStored.Count -gt 0) {
            Write-Host "::error::.nsis.zip updater bundle is NOT Stored-compressed; the Windows updater cannot extract it (#2479):"
            $notStored | ForEach-Object { Write-Host "    $_" }
            exit 1
          }
          Write-Host "Updater bundle compression verified: all $entryCount entries Stored (method 0)."

          $extractDir = Join-Path $env:RUNNER_TEMP "nsis-zip-verify"
          if (Test-Path $extractDir) { Remove-Item -Path $extractDir -Recurse -Force }
          Expand-Archive -Path $zip.FullName -DestinationPath $extractDir -Force
          $files = @(Get-ChildItem -Path $extractDir -Recurse -Include "*.exe","*.dll" -File)
          if ($files.Count -eq 0) {
            Write-Host "::error::.nsis.zip contained no .exe/.dll to verify — unexpected updater layout."
            exit 1
          }
          $unsigned = @()
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature -LiteralPath $f.FullName
            if ($sig.Status -eq "Valid") {
              Write-Host "  Valid: $($f.Name)"
            } else {
              $unsigned += "$($f.Name): $($sig.Status)"
            }
          }
          if ($unsigned.Count -gt 0) {
            Write-Host "::error::Unsigned/invalid binaries inside .nsis.zip updater bundle:"
            $unsigned | ForEach-Object { Write-Host "    $_" }
            exit 1
          }
          Write-Host "All binaries inside the .nsis.zip updater bundle are validly signed."
          Remove-Item -Path $extractDir -Recurse -Force

      # createUpdaterArtifacts emits a second, duplicate installer copy under
      # bundle/nsis-updater/ that nothing ships — the installer uploads from
      # bundle/nsis/*.exe and the updater from bundle/nsis/*.nsis.zip. That copy
      # is never EV-signed, so drop it before the coverage audit rather than
      # spend a signature on a dead artifact (#2289).
      - name: Drop unshipped nsis-updater byproduct (Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        shell: pwsh
        run: |
          $dir = "src-tauri/target/${{ matrix.target }}/release/bundle/nsis-updater"
          if (Test-Path -LiteralPath $dir) {
            Write-Host "Removing unshipped Tauri byproduct: $dir"
            Remove-Item -LiteralPath $dir -Recurse -Force
          } else {
            Write-Host "No nsis-updater directory present; nothing to drop."
          }

      # Recursive Authenticode check over every loose .exe/.dll the Tauri build
      # emits under bundle/. Now that the embedded runtime is EV-signed pre-build
      # (#2235), any unsigned/invalid file here is a real regression — a missed
      # signing root or a signer that silently dropped a file — so this is a hard
      # gate, not a warning. Deep verification of the binaries packed INSIDE the
      # installer / updater archives is done by the extraction checks in #2236
      # (.nsis.zip) and #2237 ($PLUGINSDIR helper DLLs).
      - name: Audit Windows payload signature coverage
        id: audit_windows_payload
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED != 'true'
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/${{ matrix.target }}/release/bundle"
          $unsignedFiles = @()
          $validFiles = @()
          Get-ChildItem -Path $bundleRoot -Recurse -Include "*.exe","*.dll" -File | ForEach-Object {
            $sig = Get-AuthenticodeSignature -LiteralPath $_.FullName
            if ($sig.Status -eq "Valid") {
              $validFiles += $_.FullName
            } else {
              $unsignedFiles += [PSCustomObject]@{
                Path = $_.FullName.Substring($bundleRoot.Length).TrimStart("/\")
                Status = $sig.Status.ToString()
              }
            }
          }
          Write-Host "Signed files in bundle: $($validFiles.Count)"
          Write-Host "Unsigned/invalid files in bundle: $($unsignedFiles.Count)"
          if ($unsignedFiles.Count -gt 0) {
            Write-Host "::error::Unsigned/invalid .exe/.dll in Windows payload after embedded-runtime signing (#2235):"
            $unsignedFiles | Format-Table -AutoSize | Out-String | Write-Host
            exit 1
          }
          Write-Host "All loose .exe/.dll in the Windows bundle are validly signed."

      # Deepest gate: 7-Zip can unpack an NSIS installer, exposing the files it
      # would extract at runtime — the $PLUGINSDIR helper DLLs (#2237) AND the
      # whole embedded runtime (#2235), which are otherwise hidden inside the
      # compressed setup .exe. Confirm every embedded .exe/.dll/.node carries a
      # Valid Authenticode signature. This is what a user's Smart App Control
      # actually evaluates, so a failure here means a real publisher prompt.
      - name: Verify embedded installer payload signatures (Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED != 'true'
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          $setup = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) {
            Write-Host "::error::No setup .exe found to deep-verify."
            exit 1
          }
          $sevenZip = "7z"
          if (-not (Get-Command 7z -ErrorAction SilentlyContinue)) {
            $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          }
          $extractDir = Join-Path $env:RUNNER_TEMP "setup-exe-verify"
          if (Test-Path $extractDir) { Remove-Item -Path $extractDir -Recurse -Force }
          # NSIS extraction emits warnings (exit 1) for the script sections; only
          # a fatal error (>=2) means the unpack failed.
          & $sevenZip x "$($setup.FullName)" "-o$extractDir" -y | Out-Null
          if ($LASTEXITCODE -ge 2) {
            Write-Host "::error::7-Zip failed to unpack $($setup.Name) (exit $LASTEXITCODE)."
            exit 1
          }
          $pluginDir = Join-Path $extractDir '$PLUGINSDIR'
          if (-not (Test-Path $pluginDir)) {
            # The recursive signature scan below is the real gate; this only
            # flags that 7-Zip labelled the helper-DLL folder unexpectedly.
            Write-Host "::warning::No `$PLUGINSDIR folder in the unpacked installer; helper DLLs will still be checked by the recursive scan (#2237)."
          }
          $bins = @(Get-ChildItem -Path $extractDir -Recurse -Include "*.exe","*.dll","*.node" -File)
          Write-Host "Embedded binaries to verify: $($bins.Count)"
          $unsigned = @()
          foreach ($b in $bins) {
            $sig = Get-AuthenticodeSignature -LiteralPath $b.FullName
            if ($sig.Status -ne "Valid") {
              $unsigned += [PSCustomObject]@{
                Path = $b.FullName.Substring($extractDir.Length).TrimStart("/\")
                Status = $sig.Status.ToString()
              }
            }
          }
          if ($unsigned.Count -gt 0) {
            Write-Host "::error::Unsigned/invalid binaries inside the installer ($($unsigned.Count) of $($bins.Count)) — Smart App Control will prompt on these:"
            $unsigned | Format-Table -AutoSize | Out-String | Write-Host
            exit 1
          }
          Write-Host "All $($bins.Count) embedded installer binaries (incl. `$PLUGINSDIR helper DLLs) are validly signed."
          Remove-Item -Path $extractDir -Recurse -Force

      - name: Verify budget-blocked Windows fallback is unsigned
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED == 'true'
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          $setup = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) {
            Write-Host "::error::Budget-blocked build produced no Windows setup artifact."
            exit 1
          }
          $sig = Get-AuthenticodeSignature -LiteralPath $setup.FullName
          if ($sig.Status -eq "Valid") {
            Write-Host "::error::Budget-blocked fallback unexpectedly produced a validly Authenticode-signed setup artifact."
            exit 1
          }
          Write-Host "Budget-blocked Windows fallback is present and not EV signed: $($setup.Name) status=$($sig.Status)."

      # Scan the Tauri-generated NSI / NSH output for unresolved ${...}
      # placeholders. #2230 showed "${product_name} is running" rendering
      # literally in the installer UI, which means a template variable
      # leaked through unsubstituted. Fail the build if any are found so
      # this regression cannot ship to users again.
      - name: Scan NSIS template for unresolved placeholders
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $nsiRoot = "src-tauri/target/${{ matrix.target }}/release/nsis"
          if (-not (Test-Path $nsiRoot)) {
            Write-Host "No generated NSIS template directory at $nsiRoot — skipping scan"
            exit 0
          }
          node scripts/scan-nsis-placeholders.mjs $nsiRoot

      # Upload artifacts
      - name: Upload Windows NSIS
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: Seren-Desktop-${{ matrix.name }}.exe
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload Linux DEB
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: Seren-Desktop-${{ matrix.name }}.deb
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload Linux AppImage
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: Seren-Desktop-${{ matrix.name }}.AppImage
          path: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      # Rename macOS updater artifacts to include architecture so both can coexist
      # in the same GitHub release (both aarch64 and x86_64 generate "SerenDesktop.app.tar.gz")
      - name: Rename macOS updater artifacts per architecture
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "No macos bundle directory found"
            exit 0
          fi

          case "${{ matrix.target }}" in
            aarch64-apple-darwin) ARCH="aarch64" ;;
            x86_64-apple-darwin) ARCH="x64" ;;
            *) echo "Unknown macOS target: ${{ matrix.target }}"; exit 1 ;;
          esac

          if [ -f "$BUNDLE_DIR/SerenDesktop.app.tar.gz" ]; then
            mv "$BUNDLE_DIR/SerenDesktop.app.tar.gz" "$BUNDLE_DIR/SerenDesktop_${ARCH}.app.tar.gz"
            echo "Renamed: SerenDesktop.app.tar.gz -> SerenDesktop_${ARCH}.app.tar.gz"
          fi

          if [ -f "$BUNDLE_DIR/SerenDesktop.app.tar.gz.sig" ]; then
            mv "$BUNDLE_DIR/SerenDesktop.app.tar.gz.sig" "$BUNDLE_DIR/SerenDesktop_${ARCH}.app.tar.gz.sig"
            echo "Renamed: SerenDesktop.app.tar.gz.sig -> SerenDesktop_${ARCH}.app.tar.gz.sig"
          fi

          echo "Files in $BUNDLE_DIR:"
          ls -la "$BUNDLE_DIR/" || true

      # Upload updater artifacts (tar.gz/zip bundles + signatures)
      - name: Upload macOS updater bundle
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: update-${{ matrix.updater_platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz.sig
          if-no-files-found: warn

      - name: Upload Windows updater bundle
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: update-${{ matrix.updater_platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: warn

      - name: Upload Windows signing cache state
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true' && env.WINDOWS_SIGNING_BLOCKED != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windows-signing-cache-state
          path: windows-signing-cache-state.json
          if-no-files-found: error

      - name: Upload Windows signing budget state
        if: matrix.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windows-signing-budget-state
          path: windows-signing-budget-state.json
          if-no-files-found: error

      - name: Upload Linux updater bundle
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: update-${{ matrix.updater_platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.tar.gz.sig
          if-no-files-found: warn

      # Clean up macOS keychain (only if we created one)
      - name: Cleanup macOS keychain
        if: matrix.os == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true' && always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  windows-app-e2e:
    needs: build
    runs-on: ubuntu-latest
    env:
      WINDOWS_E2E_INSTANCE_ID: ${{ secrets.WINDOWS_E2E_INSTANCE_ID }}
      WINDOWS_E2E_S3_BUCKET: ${{ secrets.WINDOWS_E2E_S3_BUCKET }}
      WINDOWS_E2E_SECRET_PARAMETER_PREFIX: ${{ secrets.WINDOWS_E2E_SECRET_PARAMETER_PREFIX }}
      WINDOWS_E2E_AWS_ROLE_ARN: ${{ secrets.WINDOWS_E2E_AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      # EventBridge Scheduler that stops the shared e2e box nightly (23:00 ET).
      # The release suspends it for the duration of the e2e run so the box is not
      # killed mid-test (#2630), and restores it in an always() teardown.
      WINDOWS_E2E_AUTO_STOP_SCHEDULE: seren-sandbox-auto-stop
    steps:
      - name: Checkout e2e scripts
        uses: actions/checkout@v7

      - name: Download signed Windows installer
        uses: actions/download-artifact@v8
        with:
          name: Seren-Desktop-Windows-x64.exe
          path: windows-artifact

      - name: Download Windows signing budget state
        uses: actions/download-artifact@v8
        with:
          name: windows-signing-budget-state
          path: windows-signing-budget-state

      - name: Validate Windows e2e AWS configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in WINDOWS_E2E_INSTANCE_ID WINDOWS_E2E_S3_BUCKET WINDOWS_E2E_SECRET_PARAMETER_PREFIX AWS_REGION; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ -z "${WINDOWS_E2E_AWS_ROLE_ARN:-}" ] && { [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; }; then
            missing+=("WINDOWS_E2E_AWS_ROLE_ARN or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required Windows e2e secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Configure AWS credentials with OIDC role
        if: env.WINDOWS_E2E_AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.WINDOWS_E2E_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: env.WINDOWS_E2E_AWS_ROLE_ARN == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Verify the box's journey inputs exist in Parameter Store BEFORE we start
      # the host or send the SSM command. A missing parameter otherwise only
      # surfaces inside the on-box harness, ~an hour into the run (v3.55.3, the
      # missing agent credential archive). Mirror the on-box agent-backend logic
      # so a misconfiguration fails here in seconds.
      - name: Preflight Windows e2e box prerequisites
        shell: bash
        run: |
          # This is a best-effort early check. If the runner's role cannot read
          # Parameter Store (the box uses its own role), we must fail OPEN — skip
          # with a warning, never block the release on the preflight's own
          # permission gap. GitHub's default 'shell: bash' runs with -e already
          # set, so 'set +e' is required: otherwise a non-zero SSM probe (e.g.
          # AccessDenied, exit 254) aborts the step before the fail-open below.
          set -uo pipefail
          set +e
          prefix="${WINDOWS_E2E_SECRET_PARAMETER_PREFIX%/}"
          required=(
            SEREN_E2E_EMAIL SEREN_E2E_PASSWORD
            SEREN_E2E_GITHUB_PAT
          )
          agent=(
            SEREN_E2E_AGENT_CREDENTIALS_REQUIRED
            SEREN_E2E_AGENT_CREDENTIAL_ARCHIVE_S3_URI SEREN_E2E_AGENT_CREDENTIAL_ARCHIVE_B64
            SEREN_E2E_AGENT_USE_BEDROCK SEREN_E2E_AGENT_MODEL
          )
          names=()
          for n in "${required[@]}" "${agent[@]}"; do names+=("$prefix/$n"); done
          json="$(aws ssm get-parameters --with-decryption --names "${names[@]}" --output json 2>/dev/null)"
          if [ -z "$json" ]; then
            echo "::warning::Could not query SSM Parameter Store for the e2e preflight (permissions or transport); skipping."
            exit 0
          fi
          present() { printf '%s' "$json" | jq -e --arg n "$prefix/$1" '.Parameters[]|select(.Name==$n)' >/dev/null 2>&1; }
          val()     { printf '%s' "$json" | jq -r  --arg n "$prefix/$1" '(.Parameters[]|select(.Name==$n)|.Value) // ""'; }
          is_truthy() {
            case "$(printf '%s' "${1:-}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')" in
              1|true|yes|on) return 0 ;; *) return 1 ;;
            esac
          }
          fail=()
          for n in "${required[@]}"; do present "$n" || fail+=("$n"); done
          # Agent backend: a credentialed run needs an archive; a Bedrock run does
          # not. Both flags default to true when unset, matching the on-box harness.
          creds_required="$(val SEREN_E2E_AGENT_CREDENTIALS_REQUIRED)"
          if is_truthy "${creds_required:-1}"; then
            if ! present SEREN_E2E_AGENT_CREDENTIAL_ARCHIVE_S3_URI && ! present SEREN_E2E_AGENT_CREDENTIAL_ARCHIVE_B64; then
              fail+=("agent credential archive (SEREN_E2E_AGENT_CREDENTIAL_ARCHIVE_S3_URI or _B64) - credentials are required")
            fi
          else
            use_bedrock="$(val SEREN_E2E_AGENT_USE_BEDROCK)"
            if is_truthy "${use_bedrock:-1}" && ! present SEREN_E2E_AGENT_MODEL; then
              fail+=("SEREN_E2E_AGENT_MODEL - the Bedrock backend needs a model id")
            fi
          fi
          if [ "${#fail[@]}" -gt 0 ]; then
            printf '::error::Windows e2e box prerequisite(s) missing under %s: %s\n' "$prefix" "${fail[*]}"
            exit 1
          fi
          echo "Windows e2e box prerequisites present."

      # The nightly seren-sandbox-auto-stop schedule (23:00 ET) is a direct
      # ec2:stopInstances with no awareness of in-flight releases, so a release
      # that reaches e2e inside the stop window loses the box mid-command and the
      # gate stalls for ~105 min (#2630). Suspend the schedule for the duration of
      # this run; the always() teardown re-enables it. This runs BEFORE starting
      # the box so a stop cannot fire during the up-to-10-min boot wait below.
      # scheduler:UpdateSchedule is a full-definition replace, so round-trip the
      # live definition through jq and only flip State to avoid corrupting the
      # target. Fail OPEN: a missing scheduler permission must not block the
      # release — the run then proceeds at the status-quo risk and the self-heal
      # restart below recovers if the box is stopped anyway.
      - name: Suspend nightly auto-stop during e2e
        shell: bash
        run: |
          set -uo pipefail
          set +e
          def="$(aws scheduler get-schedule \
            --name "$WINDOWS_E2E_AUTO_STOP_SCHEDULE" \
            --region "$AWS_REGION" 2>/dev/null \
            | jq 'del(.Arn,.CreationDate,.LastModificationDate) | .State="DISABLED"')"
          if [ -z "$def" ] || [ "$def" = "null" ]; then
            echo "::warning::Could not read schedule '$WINDOWS_E2E_AUTO_STOP_SCHEDULE' (missing or no permission); skipping suspend. The run proceeds unprotected; the self-heal restart recovers a mid-run stop."
            exit 0
          fi
          if aws scheduler update-schedule \
            --region "$AWS_REGION" \
            --cli-input-json "$def" >/dev/null 2>&1; then
            echo "Suspended nightly auto-stop '$WINDOWS_E2E_AUTO_STOP_SCHEDULE' for this run."
          else
            echo "::warning::Failed to suspend '$WINDOWS_E2E_AUTO_STOP_SCHEDULE' (no scheduler permission?); proceeding unprotected. The self-heal restart recovers a mid-run stop."
          fi

      # The e2e host is a shared box that other tooling stops to save cost.
      # SendCommand against a stopped instance fails with InvalidInstanceId
      # (v3.52.9, #2318) — start it if needed and wait for the SSM agent to
      # report Online before staging work on it.
      - name: Ensure Windows e2e host is running
        shell: bash
        run: |
          set -euo pipefail
          state="$(aws ec2 describe-instances --instance-ids "$WINDOWS_E2E_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' --output text)"
          echo "Instance state: $state"
          if [ "$state" != "running" ]; then
            aws ec2 start-instances --instance-ids "$WINDOWS_E2E_INSTANCE_ID" >/dev/null
            aws ec2 wait instance-running --instance-ids "$WINDOWS_E2E_INSTANCE_ID"
            echo "Instance started."
          fi
          deadline=$((SECONDS + 600))
          until [ "$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$WINDOWS_E2E_INSTANCE_ID" \
            --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null)" = "Online" ]; do
            if [ "$SECONDS" -gt "$deadline" ]; then
              echo "::error::Timed out waiting for the SSM agent to come online on the Windows e2e host."
              exit 1
            fi
            echo "Waiting for SSM agent..."
            sleep 15
          done
          echo "SSM agent online."

      - name: Stage Windows e2e payload in S3
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          installer="$(find windows-artifact -type f -name '*.exe' | head -n 1)"
          if [ -z "$installer" ]; then
            echo "::error::No Windows installer artifact found"
            exit 1
          fi
          budget_state="windows-signing-budget-state/windows-signing-budget-state.json"
          if [ ! -f "$budget_state" ]; then
            echo "::error::Windows signing budget state artifact is missing"
            exit 1
          fi
          signing_blocked="$(jq -r 'if .blocked == true then "true" else "false" end' "$budget_state")"
          payload="$RUNNER_TEMP/windows-e2e-payload.zip"
          zip -q -r "$payload" \
            package.json \
            pnpm-lock.yaml \
            scripts/windows-e2e-task-user.ps1 \
            scripts/windows-e2e-app.ps1 \
            scripts/windows-e2e-app.mjs
          prefix="release-windows-e2e/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}"
          installer_s3="s3://${WINDOWS_E2E_S3_BUCKET}/${prefix}/SerenDesktop-setup.exe"
          payload_s3="s3://${WINDOWS_E2E_S3_BUCKET}/${prefix}/windows-e2e-payload.zip"
          logs_key="${prefix}/windows-e2e-logs.zip"
          aws s3 cp "$installer" "$installer_s3"
          aws s3 cp "$payload" "$payload_s3"
          installer_url="$(aws s3 presign "$installer_s3" --expires-in 7200)"
          payload_url="$(aws s3 presign "$payload_s3" --expires-in 7200)"
          logs_upload_url="$(
            WINDOWS_E2E_LOG_BUCKET="$WINDOWS_E2E_S3_BUCKET" \
            WINDOWS_E2E_LOG_KEY="$logs_key" \
            python3 <<'PY'
          import os
          import subprocess
          import sys

          try:
              import boto3
          except ModuleNotFoundError:
              subprocess.check_call(
                  [sys.executable, "-m", "pip", "install", "--quiet", "boto3"],
                  stdout=subprocess.DEVNULL,
              )
              import boto3

          bucket = os.environ["WINDOWS_E2E_LOG_BUCKET"]
          key = os.environ["WINDOWS_E2E_LOG_KEY"]
          client = boto3.client("s3", region_name=os.environ.get("AWS_REGION"))
          print(
              client.generate_presigned_url(
                  "put_object",
                  Params={"Bucket": bucket, "Key": key},
                  ExpiresIn=7200,
                  HttpMethod="PUT",
              )
          )
          PY
          )"
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "signing_blocked=$signing_blocked" >> "$GITHUB_OUTPUT"
          {
            echo "installer_url<<EOF"
            echo "$installer_url"
            echo "EOF"
            echo "payload_url<<EOF"
            echo "$payload_url"
            echo "EOF"
            echo "logs_upload_url<<EOF"
            echo "$logs_upload_url"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run full Windows app e2e on AWS host
        id: ssm
        shell: bash
        env:
          S3_PREFIX: ${{ steps.stage.outputs.prefix }}
          INSTALLER_URL: ${{ steps.stage.outputs.installer_url }}
          PAYLOAD_URL: ${{ steps.stage.outputs.payload_url }}
          LOGS_UPLOAD_URL: ${{ steps.stage.outputs.logs_upload_url }}
          WINDOWS_SIGNING_BLOCKED: ${{ steps.stage.outputs.signing_blocked }}
        run: |
          set -euo pipefail
          node <<'NODE' > "$RUNNER_TEMP/windows-e2e-commands.json"
          const env = process.env;
          const psString = (value) => `'${String(value).replaceAll("'", "''")}'`;
          if (!env.INSTALLER_URL || !env.PAYLOAD_URL || !env.LOGS_UPLOAD_URL) {
            throw new Error("Missing presigned Windows e2e payload URL(s)");
          }
          const workName = `seren-release-windows-e2e-${env.GITHUB_RUN_ID}-${env.GITHUB_RUN_ATTEMPT}`;
          const logsS3Uri = `s3://${env.WINDOWS_E2E_S3_BUCKET}/${env.S3_PREFIX}/windows-e2e-logs.zip`;
          const unsignedBudgetArg = env.WINDOWS_SIGNING_BLOCKED === 'true'
            ? ' -AllowUnsignedBudgetBlockedArtifact'
            : '';
          const commands = [
            "$ErrorActionPreference = 'Stop'",
            "$ProgressPreference = 'SilentlyContinue'",
            `$work = Join-Path $env:TEMP '${workName}'`,
            `$logsS3Uri = ${psString(logsS3Uri)}`,
            `$logsUploadUrl = ${psString(env.LOGS_UPLOAD_URL)}`,
            // Prune leaked scratch dirs from prior runs (#2901). A crash before
            // the finally-cleanup below leaves one 'seren-release-windows-e2e-*'
            // dir per run; 99 of them filled the box C: drive to 96.9% free=6.26GB
            // and slowed the NSIS install to 7+ min. Delete ALL of them (not just
            // this run-id) so the drive self-heals even after a prior crash.
            "$stale = @(Get-ChildItem -LiteralPath $env:TEMP -Directory -Filter 'seren-release-windows-e2e-*' -ErrorAction SilentlyContinue)",
            "if ($stale.Count -gt 0) { Write-Host \"[windows-e2e:ssm] Pruning $($stale.Count) leaked scratch dir(s) from prior runs\"; $stale | ForEach-Object { Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction SilentlyContinue } }",
            "$sysDrive = if ([string]::IsNullOrWhiteSpace($env:SystemDrive)) { 'C:' } else { $env:SystemDrive }",
            "$freeGb = [math]::Round((Get-PSDrive -Name $sysDrive.TrimEnd(':')).Free / 1GB, 2)",
            "if ($freeGb -lt 15) { Write-Host \"::warning::[windows-e2e:ssm] Low disk: $sysDrive has $freeGb GB free (<15 GB); WebView2 CDP startup may stall (see #2901/#2902)\" } else { Write-Host \"[windows-e2e:ssm] $sysDrive free space: $freeGb GB\" }",
            "New-Item -ItemType Directory -Force -Path $work | Out-Null",
            // The download -> run -> upload sequence removes $work in the finally
            // below on BOTH success and failure, so the scratch never leaks (#2901).
            "try {",
            "Write-Host '[windows-e2e:ssm] Downloading staged installer and payload'",
            `Invoke-WebRequest -Uri ${psString(env.INSTALLER_URL)} -OutFile (Join-Path $work 'SerenDesktop-setup.exe')`,
            `Invoke-WebRequest -Uri ${psString(env.PAYLOAD_URL)} -OutFile (Join-Path $work 'windows-e2e-payload.zip')`,
            "Write-Host '[windows-e2e:ssm] Expanding e2e payload'",
            "Expand-Archive -LiteralPath (Join-Path $work 'windows-e2e-payload.zip') -DestinationPath $work -Force",
            "Set-Location $work",
            "Write-Host '[windows-e2e:ssm] Running Windows app harness as scheduled task user'",
            `powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\windows-e2e-task-user.ps1 -InstallerPath (Join-Path $work 'SerenDesktop-setup.exe') -WorkDir $work -SecretParameterPrefix ${psString(env.WINDOWS_E2E_SECRET_PARAMETER_PREFIX)} -ProbeTimeoutSeconds 1800 -TaskTimeoutSeconds 3600${unsignedBudgetArg}`,
            "$harnessExitCode = $LASTEXITCODE",
            "Write-Host '[windows-e2e:ssm] Bundling Windows app harness logs'",
            "$logPaths = @((Join-Path $work 'windows-e2e-task.log'), (Join-Path $work 'windows-e2e-logs')) | Where-Object { Test-Path -LiteralPath $_ }",
            "if (@($logPaths).Count -eq 0) { Set-Content -LiteralPath (Join-Path $work 'windows-e2e-log-missing.txt') -Value 'No Windows e2e logs were produced.'; $logPaths = @((Join-Path $work 'windows-e2e-log-missing.txt')) }",
            "$logBundle = Join-Path $work 'windows-e2e-logs.zip'",
            "Remove-Item -LiteralPath $logBundle -Force -ErrorAction SilentlyContinue",
            "Compress-Archive -Path $logPaths -DestinationPath $logBundle -Force",
            "try { Invoke-WebRequest -Uri $logsUploadUrl -Method Put -InFile $logBundle -UseBasicParsing | Out-Null } catch { throw \"Failed to upload Windows app harness logs to $logsS3Uri via presigned URL: $($_.Exception.Message)\" }",
            "Write-Host \"[windows-e2e:ssm] Uploaded Windows app harness logs to $logsS3Uri\"",
            "if ($harnessExitCode -ne 0) { throw \"Windows app scheduled-task harness failed with exit code $harnessExitCode\" }",
            // Remove this run's scratch dir on BOTH success and failure, AFTER the
            // logs are uploaded above, so the box drive can't trend downward across
            // runs (#2901). Runs even when the try body throws. Set-Location out of
            // $work first: Windows cannot delete a process's current directory.
            "} finally { Set-Location -LiteralPath $env:TEMP; Remove-Item -LiteralPath $work -Recurse -Force -ErrorAction SilentlyContinue; Write-Host '[windows-e2e:ssm] Removed scratch work dir' }",
            ];
          // executionTimeout bounds the whole on-box command. It must exceed the
          // harness's own budget: the scheduled-task wait (TaskTimeoutSeconds + 60
          // = 3660s) plus the pre-task per-step timeouts (corepack/pnpm/playwright
          // ~2100s worst case). The default 3600s killed valid runs before the
          // harness finished. The harness now fails fast on a dead task (#2431),
          // so this large value is only a backstop, never the normal bound.
          process.stdout.write(
            JSON.stringify({ commands, executionTimeout: ["6000"] }, null, 2),
          );
          NODE
          send_e2e_command() {
            aws ssm send-command \
              --instance-ids "$WINDOWS_E2E_INSTANCE_ID" \
              --document-name "AWS-RunPowerShellScript" \
              --comment "Seren Desktop release Windows production e2e ${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}" \
              --parameters "file://$RUNNER_TEMP/windows-e2e-commands.json" \
              --query "Command.CommandId" \
              --output text
          }
          # The shared box is stopped nightly by the seren-sandbox-auto-stop
          # schedule (23:00 ET, #2630), with no awareness of in-flight runs. A
          # release that reaches e2e inside that window loses the box mid-command:
          # the on-box command can never complete and its SSM status stalls on
          # Pending until the deadline, then fails the release. Restart the box
          # and resend the command instead of burning the whole deadline on a
          # command that is already dead. The schedule fires once per night, so a
          # single restart is the normal case; the cap bounds a genuinely broken
          # host.
          restart_e2e_host() {
            echo "::warning::Windows e2e host was stopped mid-run (likely the nightly auto-stop, #2630); restarting and resending the command."
            aws ec2 wait instance-stopped --instance-ids "$WINDOWS_E2E_INSTANCE_ID" || true
            aws ec2 start-instances --instance-ids "$WINDOWS_E2E_INSTANCE_ID" >/dev/null
            aws ec2 wait instance-running --instance-ids "$WINDOWS_E2E_INSTANCE_ID"
            online_deadline=$((SECONDS + 600))
            until [ "$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$WINDOWS_E2E_INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null)" = "Online" ]; do
              if [ "$SECONDS" -gt "$online_deadline" ]; then
                echo "::error::Windows e2e host did not return online after a mid-run stop."
                exit 1
              fi
              echo "Waiting for SSM agent after restart..."
              sleep 15
            done
            echo "Windows e2e host back online after restart."
          }
          max_restarts=2
          restart_count=0
          command_id="$(send_e2e_command)"
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"
          echo "SSM command: $command_id"
          # Poll past the SSM executionTimeout (6000s) so the on-box command, not
          # the runner, decides the verdict and we capture its stdout/stderr.
          deadline=$((SECONDS + 6300))
          while true; do
            status="$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$WINDOWS_E2E_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo Pending)"
            echo "Windows e2e SSM status: $status"
            case "$status" in
              Success) break ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "$command_id" \
                  --instance-id "$WINDOWS_E2E_INSTANCE_ID" \
                  --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
                  --output json
                exit 1
                ;;
            esac
            # A box stopped out from under the command never reaches a terminal
            # SSM status, so detect it directly from EC2 state rather than waiting
            # out the deadline. Treat a transient describe error (unknown) as
            # "keep polling" so an API blip does not trigger a needless restart.
            instance_state="$(aws ec2 describe-instances \
              --instance-ids "$WINDOWS_E2E_INSTANCE_ID" \
              --query 'Reservations[0].Instances[0].State.Name' \
              --output text 2>/dev/null || echo unknown)"
            if [ "$instance_state" != "running" ] && [ "$instance_state" != "unknown" ]; then
              echo "Windows e2e host state is '$instance_state' while the command is still running."
              if [ "$restart_count" -ge "$max_restarts" ]; then
                echo "::error::Windows e2e host was stopped mid-run and the restart cap ($max_restarts) is exhausted."
                exit 1
              fi
              restart_count=$((restart_count + 1))
              restart_e2e_host
              command_id="$(send_e2e_command)"
              echo "SSM command (restart $restart_count/$max_restarts): $command_id"
              deadline=$((SECONDS + 6300))
              continue
            fi
            if [ "$SECONDS" -gt "$deadline" ]; then
              echo "::error::Timed out waiting for Windows e2e SSM command $command_id"
              exit 1
            fi
            sleep 30
          done
          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$WINDOWS_E2E_INSTANCE_ID" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json

      # Re-enable the nightly auto-stop regardless of the e2e outcome so a release
      # never leaves the shared box pinned-on (cost leak). Idempotent: re-applies
      # the live definition with State=ENABLED even if the suspend step did not run
      # or already restored it. Fail OPEN here too — teardown cannot meaningfully
      # block, and the Terraform-managed schedule's desired state (ENABLED) is the
      # backstop that corrects a stuck-disabled schedule on the next apply (#2630).
      - name: Restore nightly auto-stop
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          set +e
          def="$(aws scheduler get-schedule \
            --name "$WINDOWS_E2E_AUTO_STOP_SCHEDULE" \
            --region "$AWS_REGION" 2>/dev/null \
            | jq 'del(.Arn,.CreationDate,.LastModificationDate) | .State="ENABLED"')"
          if [ -z "$def" ] || [ "$def" = "null" ]; then
            echo "::warning::Could not read schedule '$WINDOWS_E2E_AUTO_STOP_SCHEDULE' to restore it; Terraform will re-enable it on the next apply."
            exit 0
          fi
          if aws scheduler update-schedule \
            --region "$AWS_REGION" \
            --cli-input-json "$def" >/dev/null 2>&1; then
            echo "Restored nightly auto-stop '$WINDOWS_E2E_AUTO_STOP_SCHEDULE'."
          else
            echo "::error::Failed to restore '$WINDOWS_E2E_AUTO_STOP_SCHEDULE' to ENABLED. The shared e2e box may stay running. Re-enable it manually or via the next Terraform apply."
          fi

      - name: Download Windows e2e log bundle
        if: always()
        shell: bash
        env:
          S3_PREFIX: ${{ steps.stage.outputs.prefix }}
        run: |
          set -uo pipefail
          mkdir -p windows-e2e-logs
          if [ -z "${S3_PREFIX:-}" ]; then
            echo "::warning::Windows e2e S3 prefix was not produced; skipping log download."
            exit 0
          fi
          if ! aws s3 cp "s3://${WINDOWS_E2E_S3_BUCKET}/${S3_PREFIX}/windows-e2e-logs.zip" windows-e2e-logs/windows-e2e-logs.zip; then
            echo "::warning::Windows e2e log bundle was not available in S3."
          fi

      - name: Upload Windows e2e logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-app-e2e-logs
          path: windows-e2e-logs/
          if-no-files-found: warn

  publish-release:
    needs: [create-release, build, windows-app-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      # Step 1: Upload assets to GitHub release and publish (undraft) it
      - name: Publish release
        uses: actions/github-script@v9
        with:
          # uploads.github.com occasionally exceeds undici's 5min Headers
          # Timeout on large updater archives. The upload loop is idempotent
          # (skips assets already present on the release), so retry transient
          # failures instead of dying mid-walk and stranding R2 mirror steps.
          retries: 3
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const initialReleaseId = '${{ needs.create-release.outputs.release_id }}';
            const tagName = '${{ github.ref_name }}';
            const artifactsDir = 'artifacts';

            const resolveCanonicalRelease = async () => {
              try {
                const { data } = await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag: tagName
                });
                console.log(`Resolved canonical release by tag ${tagName}: ${data.id} (draft=${data.draft})`);
                return data;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                if (!initialReleaseId) {
                  throw new Error(`No release found for tag ${tagName} and no fallback release ID is available`);
                }

                const fallbackReleaseId = Number(initialReleaseId);
                if (!Number.isFinite(fallbackReleaseId)) {
                  throw new Error(`Invalid fallback release ID: ${initialReleaseId}`);
                }

                console.log(`No release currently resolves by tag ${tagName}; falling back to release ID ${fallbackReleaseId}`);
                const { data } = await github.rest.repos.getRelease({
                  owner,
                  repo,
                  release_id: fallbackReleaseId
                });
                return data;
              }
            };

            const syncArtifactsToRelease = async (release) => {
              const releaseId = release.id;
              console.log(`Syncing artifacts to release ID ${releaseId} for tag ${tagName}`);

              const existingAssets = await github.rest.repos.listReleaseAssets({
                owner,
                repo,
                release_id: releaseId
              });
              const existingNames = new Set(existingAssets.data.map((asset) => asset.name));

              const uploadAsset = async (filePath, fileName) => {
                if (existingNames.has(fileName)) {
                  console.log(`Skipping ${fileName} on release ${releaseId} - already exists`);
                  return;
                }

                const content = fs.readFileSync(filePath);
                await github.rest.repos.uploadReleaseAsset({
                  owner,
                  repo,
                  release_id: releaseId,
                  name: fileName,
                  data: content
                });
                existingNames.add(fileName);
              };

              const walkDir = async (dir) => {
                const files = fs.readdirSync(dir);
                for (const file of files) {
                  const filePath = path.join(dir, file);
                  const stat = fs.statSync(filePath);
                  if (stat.isDirectory()) {
                    await walkDir(filePath);
                  } else {
                    console.log(`Uploading to release ${releaseId}: ${filePath}`);
                    await uploadAsset(filePath, file);
                  }
                }
              };

              await walkDir(artifactsDir);
            };

            const uploadTarget = await resolveCanonicalRelease();
            await syncArtifactsToRelease(uploadTarget);

            const publishTarget = await resolveCanonicalRelease();
            if (publishTarget.id !== uploadTarget.id) {
              console.log(`Canonical release changed from ${uploadTarget.id} to ${publishTarget.id}; syncing artifacts to the latest canonical release`);
              await syncArtifactsToRelease(publishTarget);
            }

            // Resolve the Windows-signed claim against actual artifact
            // presence. The build job's `Require Windows signing for tag
            // releases` step refuses to publish unsigned for v* tags, and
            // the `Verify Windows code signing (NSIS setup .exe)` step
            // fails the build on signature mismatch. So if a Windows setup
            // .exe lands here for a v* tag, signing succeeded. For other
            // tag formats (dev builds), don't claim signing happened.
            //
            // #2230 audit item I: prior workflow unconditionally claimed
            // "Windows builds are EV code signed" in release notes even when
            // the unsigned build path produced the artifact.
            const isProductionTag = tagName.startsWith('v');
            const hasWindowsArtifact = fs.existsSync(artifactsDir)
              && fs.readdirSync(artifactsDir).some((entry) => {
                const dir = path.join(artifactsDir, entry);
                if (!fs.statSync(dir).isDirectory()) return false;
                return fs.readdirSync(dir).some((f) => f.endsWith('-setup.exe'));
              });
            const budgetStatePath = path.join(artifactsDir, 'windows-signing-budget-state', 'windows-signing-budget-state.json');
            const windowsSigningBlocked = fs.existsSync(budgetStatePath)
              && JSON.parse(fs.readFileSync(budgetStatePath, 'utf8')).blocked === true;
            const windowsSignedClaim = isProductionTag && hasWindowsArtifact && !windowsSigningBlocked
              ? 'Windows builds are EV code signed. If you still see a SmartScreen warning, click "More info" → "Run anyway"; reputation builds with installs.'
              : 'Windows artifacts in this release are NOT EV code signed.';
            const noteMarker = '<!-- WINDOWS_SIGNING_NOTE -->';
            if (publishTarget.body && publishTarget.body.includes(noteMarker)) {
              const updatedBody = publishTarget.body.replace(noteMarker, windowsSignedClaim);
              console.log(`Resolving Windows signing note: tag=${tagName} hasWindowsArtifact=${hasWindowsArtifact} budgetBlocked=${windowsSigningBlocked}`);
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: publishTarget.id,
                body: updatedBody,
              });
              publishTarget.body = updatedBody;
            }

            if (publishTarget.draft) {
              console.log(`Setting release ${publishTarget.id} to published (non-draft) and binding tag ${tagName} @ ${context.sha}`);
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: publishTarget.id,
                draft: false,
                tag_name: tagName,
                target_commitish: context.sha
              });
              console.log('Release published successfully!');
            } else if (publishTarget.tag_name !== tagName) {
              console.log(`Release ${publishTarget.id} is published but tagged ${publishTarget.tag_name}; rebinding to ${tagName} @ ${context.sha}`);
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: publishTarget.id,
                tag_name: tagName,
                target_commitish: context.sha
              });
            } else {
              console.log(`Release ${publishTarget.id} for tag ${tagName} is already published; skipping undraft`);
            }

      # Step 2: Upload to R2 — the publish script above already un-drafted the release
      - name: Setup AWS CLI for R2
        run: |
          pip install awscli

      - name: Upload updater artifacts to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          TAG="${{ github.ref_name }}"

          # Upload all updater artifacts to R2 under version directory
          for platform_dir in artifacts/update-*; do
            if [ -d "$platform_dir" ]; then
              platform=$(basename "$platform_dir" | sed 's/update-//')
              echo "Uploading $platform artifacts..."

              for file in "$platform_dir"/*; do
                if [ -f "$file" ]; then
                  filename=$(basename "$file")
                  aws s3 cp "$file" "s3://${R2_BUCKET}/${TAG}/${filename}" \
                    --endpoint-url="${AWS_ENDPOINT_URL}"
                  echo "Uploaded: ${TAG}/${filename}"
                fi
              done
            fi
          done

      - name: Generate latest.json for updater (R2)
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tag = '${{ github.ref_name }}';
            const version = tag.replace(/^v/, '');
            const baseUrl = '${{ secrets.R2_PUBLIC_URL }}/' + tag;

            // Platform mapping: artifact dir name -> Tauri updater platform key
            const platforms = [
              'darwin-aarch64',
              'darwin-x86_64',
              'windows-x86_64',
              'linux-x86_64',
              'linux-aarch64'
            ];

            const manifest = {
              version,
              notes: `Release ${tag}`,
              pub_date: new Date().toISOString(),
              platforms: {}
            };

            for (const platform of platforms) {
              const dir = path.join('artifacts', `update-${platform}`);
              if (!fs.existsSync(dir)) {
                console.log(`No update artifact for ${platform}, skipping`);
                continue;
              }

              const files = fs.readdirSync(dir);
              const sigFile = files.find(f => f.endsWith('.sig'));
              const bundleFile = files.find(f => !f.endsWith('.sig'));

              if (!sigFile || !bundleFile) {
                console.log(`Missing sig or bundle for ${platform}: sig=${sigFile}, bundle=${bundleFile}`);
                continue;
              }

              const signature = fs.readFileSync(path.join(dir, sigFile), 'utf8').trim();

              manifest.platforms[platform] = {
                signature,
                url: `${baseUrl}/${bundleFile}`
              };

              console.log(`Added platform ${platform}: ${bundleFile}`);
            }

            fs.writeFileSync('artifacts/latest.json', JSON.stringify(manifest, null, 2));
            console.log('Generated latest.json:', JSON.stringify(manifest, null, 2));

      - name: Upload latest.json to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # Upload latest.json to root of bucket
          aws s3 cp artifacts/latest.json "s3://${R2_BUCKET}/latest.json" \
            --endpoint-url="${AWS_ENDPOINT_URL}" \
            --content-type "application/json"
          echo "Uploaded latest.json to R2"

      # Generate a GitHub-variant latest.json whose artifact URLs point at the
      # GitHub release assets rather than R2. This is the fallback served when
      # R2 is unreachable (e.g. ISP-level blocking of pub-*.r2.dev in Turkey).
      # Signatures are content-based and identical to the R2 manifest.
      - name: Generate latest.json for updater (GitHub)
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tag = '${{ github.ref_name }}';
            const version = tag.replace(/^v/, '');
            const baseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}`;

            const platforms = [
              'darwin-aarch64',
              'darwin-x86_64',
              'windows-x86_64',
              'linux-x86_64',
              'linux-aarch64'
            ];

            const manifest = {
              version,
              notes: `Release ${tag}`,
              pub_date: new Date().toISOString(),
              platforms: {}
            };

            for (const platform of platforms) {
              const dir = path.join('artifacts', `update-${platform}`);
              if (!fs.existsSync(dir)) {
                console.log(`No update artifact for ${platform}, skipping`);
                continue;
              }

              const files = fs.readdirSync(dir);
              const sigFile = files.find((f) => f.endsWith('.sig'));
              const bundleFile = files.find((f) => !f.endsWith('.sig'));

              if (!sigFile || !bundleFile) {
                console.log(`Missing sig or bundle for ${platform}: sig=${sigFile}, bundle=${bundleFile}`);
                continue;
              }

              const signature = fs.readFileSync(path.join(dir, sigFile), 'utf8').trim();

              manifest.platforms[platform] = {
                signature,
                url: `${baseUrl}/${bundleFile}`
              };

              console.log(`Added platform ${platform}: ${bundleFile}`);
            }

            fs.writeFileSync('artifacts/latest-github.json', JSON.stringify(manifest, null, 2));
            console.log('Generated latest-github.json:', JSON.stringify(manifest, null, 2));

      - name: Upload latest.json to GitHub release
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagName = '${{ github.ref_name }}';
            const initialReleaseId = '${{ needs.create-release.outputs.release_id }}';

            let release;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName
              });
              release = data;
              console.log(`Resolved release by tag ${tagName}: ${release.id}`);
            } catch (error) {
              if (error.status !== 404) throw error;
              const fallbackReleaseId = Number(initialReleaseId);
              if (!Number.isFinite(fallbackReleaseId)) {
                throw new Error(`No release for tag ${tagName} and invalid fallback ID: ${initialReleaseId}`);
              }
              console.log(`No release resolves by tag ${tagName}; falling back to release ID ${fallbackReleaseId}`);
              const { data } = await github.rest.repos.getRelease({
                owner,
                repo,
                release_id: fallbackReleaseId
              });
              release = data;
            }

            const existingAssets = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id: release.id
            });

            const stale = existingAssets.data.find((a) => a.name === 'latest.json');
            if (stale) {
              console.log(`Deleting stale latest.json asset ${stale.id} on release ${release.id}`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: stale.id
              });
            }

            const content = fs.readFileSync('artifacts/latest-github.json');
            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.id,
              name: 'latest.json',
              data: content
            });

            console.log(`Uploaded latest.json to GitHub release ${release.id} for tag ${tagName}`);

      - name: Upload installer files to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          TAG="${{ github.ref_name }}"

          # Upload DMG files (macOS installers)
          find artifacts -name "*.dmg" -type f | while read file; do
            filename=$(basename "$file")
            # Upload to versioned path
            aws s3 cp "$file" "s3://${R2_BUCKET}/${TAG}/${filename}" \
              --endpoint-url="${AWS_ENDPOINT_URL}" \
              --content-type "application/x-apple-diskimage"
            # Upload to latest path with versioned filename
            aws s3 cp "$file" "s3://${R2_BUCKET}/latest/${filename}" \
              --endpoint-url="${AWS_ENDPOINT_URL}" \
              --content-type "application/x-apple-diskimage"

            # Create version-less symlink for easier linking
            if echo "$filename" | grep -q "aarch64"; then
              aws s3 cp "$file" "s3://${R2_BUCKET}/latest/SerenDesktop_aarch64.dmg" \
                --endpoint-url="${AWS_ENDPOINT_URL}" \
                --content-type "application/x-apple-diskimage"
            elif echo "$filename" | grep -q "x64"; then
              aws s3 cp "$file" "s3://${R2_BUCKET}/latest/SerenDesktop_x64.dmg" \
                --endpoint-url="${AWS_ENDPOINT_URL}" \
                --content-type "application/x-apple-diskimage"
            fi
            echo "Uploaded installer: ${TAG}/${filename} and latest/${filename}"
          done

          # Upload NSIS exe files (Windows installers)
          find artifacts -name "*-setup.exe" -type f | while read file; do
            filename=$(basename "$file")
            # Upload to versioned path
            aws s3 cp "$file" "s3://${R2_BUCKET}/${TAG}/${filename}" \
              --endpoint-url="${AWS_ENDPOINT_URL}" \
              --content-type "application/x-msdownload"
            # Upload to latest path with versioned filename
            aws s3 cp "$file" "s3://${R2_BUCKET}/latest/${filename}" \
              --endpoint-url="${AWS_ENDPOINT_URL}" \
              --content-type "application/x-msdownload"

            # Create version-less symlink for easier linking
            aws s3 cp "$file" "s3://${R2_BUCKET}/latest/SerenDesktop_x64-setup.exe" \
              --endpoint-url="${AWS_ENDPOINT_URL}" \
              --content-type "application/x-msdownload"
            echo "Uploaded installer: ${TAG}/${filename} and latest/${filename}"
          done

          # Upload AppImage files (Linux installers)
          find artifacts -name "*.AppImage" -type f | while read file; do
            filename=$(basename "$file")
            # Upload to versioned path
            aws s3 cp "$file" "s3://${R2_BUCKET}/${TAG}/${filename}" \
              --endpoint-url="${AWS_ENDPOINT_URL}" \
              --content-type "application/x-executable"
            # Upload to latest path with versioned filename
            aws s3 cp "$file" "s3://${R2_BUCKET}/latest/${filename}" \
              --endpoint-url="${AWS_ENDPOINT_URL}" \
              --content-type "application/x-executable"

            # Create version-less symlink for easier linking
            if echo "$filename" | grep -Eq "aarch64|arm64"; then
              aws s3 cp "$file" "s3://${R2_BUCKET}/latest/SerenDesktop_arm64.AppImage" \
                --endpoint-url="${AWS_ENDPOINT_URL}" \
                --content-type "application/x-executable"
            elif echo "$filename" | grep -Eq "amd64|x86_64"; then
              aws s3 cp "$file" "s3://${R2_BUCKET}/latest/SerenDesktop_amd64.AppImage" \
                --endpoint-url="${AWS_ENDPOINT_URL}" \
                --content-type "application/x-executable"
            fi
            echo "Uploaded installer: ${TAG}/${filename} and latest/${filename}"
          done

          # Upload DEB files (Linux installers)
          find artifacts -name "*.deb" -type f | while read file; do
            filename=$(basename "$file")
            # Upload to versioned path
            aws s3 cp "$file" "s3://${R2_BUCKET}/${TAG}/${filename}" \
              --endpoint-url="${AWS_ENDPOINT_URL}" \
              --content-type "application/vnd.debian.binary-package"
            # Upload to latest path with versioned filename
            aws s3 cp "$file" "s3://${R2_BUCKET}/latest/${filename}" \
              --endpoint-url="${AWS_ENDPOINT_URL}" \
              --content-type "application/vnd.debian.binary-package"

            # Create version-less symlink for easier linking
            if echo "$filename" | grep -Eq "arm64|aarch64"; then
              aws s3 cp "$file" "s3://${R2_BUCKET}/latest/SerenDesktop_arm64.deb" \
                --endpoint-url="${AWS_ENDPOINT_URL}" \
                --content-type "application/vnd.debian.binary-package"
            elif echo "$filename" | grep -Eq "amd64|x86_64"; then
              aws s3 cp "$file" "s3://${R2_BUCKET}/latest/SerenDesktop_amd64.deb" \
                --endpoint-url="${AWS_ENDPOINT_URL}" \
                --content-type "application/vnd.debian.binary-package"
            fi
            echo "Uploaded installer: ${TAG}/${filename} and latest/${filename}"
          done

      - name: Prune old releases from R2 (keep last 5)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # List all version directories (v*), sort by semver descending, skip first 5
          VERSIONS=$(aws s3 ls "s3://${R2_BUCKET}/" --endpoint-url="${AWS_ENDPOINT_URL}" \
            | grep 'PRE v' | awk '{print $2}' | sed 's|/$||' \
            | sed 's/^v//' | sort -t. -k1,1rn -k2,2rn -k3,3rn | sed 's/^/v/')

          KEEP=5
          COUNT=0
          for ver in $VERSIONS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -le $KEEP ]; then
              echo "Keeping: $ver"
            else
              echo "Pruning: $ver"
              aws s3 rm "s3://${R2_BUCKET}/${ver}/" --recursive --endpoint-url="${AWS_ENDPOINT_URL}"
            fi
          done
