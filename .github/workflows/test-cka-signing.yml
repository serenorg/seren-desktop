# ABOUTME: Throwaway CI smoke test for the eSigner CKA + signtool signing path (#2276 follow-up).
# ABOUTME: Validates CKA setup (incl. KSP registration) and scripts/sign-windows-payload.ps1 on a dummy PE without cutting a release. Deleted before merge.

name: Test CKA Signing

on:
  push:
    branches:
      - fix/cka-ksp-registration

jobs:
  smoke:
    runs-on: windows-latest
    name: CKA signtool smoke test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup eSigner CKA
        shell: pwsh
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        run: |
          $installDir = Join-Path $env:USERPROFILE "eSignerCKA"
          $masterKey  = Join-Path $installDir "master.key"
          Invoke-WebRequest -Uri "https://github.com/SSLcom/eSignerCKA/releases/download/v1.0.8/SSL.COM-eSigner-CKA_1.0.8.zip" -OutFile eSigner_CKA_Setup.zip
          Expand-Archive -Force eSigner_CKA_Setup.zip
          Remove-Item eSigner_CKA_Setup.zip
          Move-Item -Destination "eSigner_CKA_Installer.exe" -Path "eSigner_CKA_Setup\*.exe"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Start-Process ".\eSigner_CKA_Installer.exe" -ArgumentList '/CURRENTUSER','/VERYSILENT','/SUPPRESSMSGBOXES',"/DIR=$installDir" -Wait
          Write-Host "=== installDir contents ==="
          Get-ChildItem -Path $installDir -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName | Write-Host
          Write-Host "=== CWD .\setup contents (if any) ==="
          Get-ChildItem -Path ".\setup" -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName | Write-Host
          # Install every bundled VC++ redist we can find (the eSigner KSP links
          # against them); search installDir and CWD.
          Get-ChildItem -Path $installDir,"." -Recurse -Filter "vc_redist*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Installing redist: $($_.FullName)"
            Start-Process $_.FullName -ArgumentList "/install","/quiet","/norestart" -Wait
          }
          $registerKsp = Get-ChildItem -Path $installDir -Recurse -Filter "RegisterKSP.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $registerKsp) {
            Write-Host "::error::RegisterKSP.exe not found under $installDir."
            Get-ChildItem -Path $installDir -Recurse | Select-Object -ExpandProperty FullName | Write-Host
            exit 1
          }
          Write-Host "RegisterKSP: $($registerKsp.FullName)"
          & $registerKsp.FullName | Out-Null
          $cspConfig = Get-ChildItem -Path $installDir -Recurse -Filter "eSignerCSP.Config.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($cspConfig) { & $cspConfig.FullName | Out-Null }
          $cka = Join-Path $installDir "eSignerCKATool.exe"
          & $cka config -mode "PRODUCTION" -user "$env:ES_USERNAME" -pass "$env:ES_PASSWORD" -totp "$env:ES_TOTP_SECRET" -key "$masterKey" -r
          & $cka unload
          & $cka load
          $cert = Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert | Select-Object -First 1
          if (-not $cert) {
            Write-Host "::error::No code-signing certificate loaded."
            exit 1
          }
          "WINDOWS_SIGN_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Write-Host "Loaded EV certificate: $($cert.Subject) [$($cert.Thumbprint)] HasPrivateKey=$($cert.HasPrivateKey)"

      - name: Sign a dummy PE with the real signing script
        id: dosign
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-sign | Out-Null
          Copy-Item "$env:SYSTEMROOT\System32\winver.exe" "test-sign\winver.exe" -Force
          Copy-Item "$env:SYSTEMROOT\System32\winver.exe" "test-sign\sample.dll" -Force
          ./scripts/sign-windows-payload.ps1 -Thumbprint $env:WINDOWS_SIGN_THUMBPRINT -Root test-sign
          Write-Host "=== Authenticode status ==="
          Get-ChildItem test-sign -File | ForEach-Object {
            $s = Get-AuthenticodeSignature -FilePath $_.FullName
            Write-Host "$($_.Name): $($s.Status) — $($s.SignerCertificate.Subject)"
          }

      - name: Dump eSigner KSP logs
        if: ${{ always() }}
        shell: pwsh
        run: |
          $logRoot = Join-Path $env:APPDATA "eSignerCKA"
          Write-Host "=== eSigner KSP log tree ($logRoot) ==="
          if (Test-Path $logRoot) {
            Get-ChildItem -Path $logRoot -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "---- $($_.FullName) ----"
              if (-not $_.PSIsContainer -and $_.Length -lt 200000) {
                Get-Content -Path $_.FullName -ErrorAction SilentlyContinue | Write-Host
              }
            }
          } else {
            Write-Host "No eSignerCKA appdata directory found."
          }

      - name: Fail if signing failed
        if: ${{ steps.dosign.outcome != 'success' }}
        run: exit 1
