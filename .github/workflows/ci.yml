name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'LICENSE'
      - '.gitignore'

# Cancel outdated runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm lint

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm test

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Prepare MCP servers
        run: pnpm prepare:mcp-servers
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  file-issue-on-failure:
    name: File issue on CI failure
    needs: [lint, test-frontend, test-rust]
    if: |
      failure() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or skip duplicate issue
        uses: actions/github-script@v8
        with:
          script: |
            const failedJobs = ['lint', 'test-frontend', 'test-rust']
              .filter(job => '${{ needs.lint.result }}' === 'failure' && job === 'lint' ||
                             '${{ needs.test-frontend.result }}' === 'failure' && job === 'test-frontend' ||
                             '${{ needs.test-rust.result }}' === 'failure' && job === 'test-rust');

            for (const job of failedJobs) {
              const title = `CI failure: ${job} on main`;

              // Dedup: skip if an open agent-task issue with this title already exists
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'agent-task',
                state: 'open',
              });
              if (existing.data.some(i => i.title === title)) {
                console.log(`Skipping duplicate: "${title}"`);
                continue;
              }

              const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  `**Job:** \`${job}\``,
                  `**Branch:** \`${context.ref}\``,
                  `**Commit:** ${context.sha}`,
                  `**Run:** ${run_url}`,
                  '',
                  '> Auto-filed by CI. Assigned to the agent for resolution.',
                  '> The agent will investigate, fix the root cause, and open a PR.',
                ].join('\n'),
                labels: ['bug', 'agent-task'],
              });
              console.log(`Filed issue: "${title}"`);
            }

  build:
    needs: [lint, test-frontend, test-rust]
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    strategy:
      matrix:
        # Only run Linux on direct pushes to main, full matrix on PRs
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Include target in cache key to prevent cache conflicts
          prefix-key: v1-${{ matrix.os }}
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm tauri build --config src-tauri/tauri.ci.json
      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm tauri build --config src-tauri/tauri.ci.json
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm tauri build --bundles deb,appimage --config src-tauri/tauri.ci.json
      - name: Verify frontend dist is current
        run: pnpm verify:frontend-build
      - uses: actions/upload-artifact@v7
        with:
          name: seren-desktop-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/
