# Triggered when an issue is labeled `agent-task`.
# The agent reads the issue, clones the repo, diagnoses the failure,
# opens a fix branch, and raises a PR — with no human in the loop.
# Uses the Seren Gateway (OpenAI-compatible) — no ANTHROPIC_API_KEY needed.
name: Agent fix

on:
  issues:
    types: [labeled]

env:
  # Harden cargo against transient crates.io download flakes (curl error 56,
  # connection reset mid-stream). Cargo's default net.retry is 3 and does not
  # always recover an in-flight reset; bump retries and disable HTTP/2
  # multiplexing so a dropped connection cannot fail the agent's cargo build/check.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  fix:
    # Only run when the agent-task label is applied
    if: github.event.label.name == 'agent-task'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v5
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile
      - name: Prepare MCP servers
        run: pnpm prepare:mcp-servers

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install agent dependencies
        run: pip install openai httpx

      - name: Configure git identity
        run: |
          git config --global user.name "seren-agent[bot]"
          git config --global user.email "agent@serendb.com"

      - name: Run agent fix
        env:
          SEREN_API_KEY: ${{ secrets.SEREN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/agent_fix.py
